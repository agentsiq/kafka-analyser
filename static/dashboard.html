<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kafka Dashboard — UAP</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    body { background: var(--bg); }
    .subnav { display: flex; background: var(--navy-1); border-bottom: 1px solid var(--border); padding: 0 40px; }
    .subnav__link { display: inline-flex; align-items: center; gap: 6px; padding: 13px 16px; font-size: .85rem; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; text-decoration: none; transition: color var(--t), border-color var(--t); }
    .subnav__link:hover { color: var(--text); }
    .subnav__link--active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .content { padding: 28px 40px; }
    .page-heading { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
    .page-heading__title { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .page-heading__sub { font-size: .88rem; color: var(--text-muted); }
    /* KPI cards */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 14px; margin-bottom: 22px; }
    .kpi { background: var(--navy-1); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 20px; }
    .kpi__label { font-size: .73rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .kpi__value { font-size: 1.9rem; font-weight: 700; line-height: 1; margin-bottom: 3px; }
    .kpi__sub { font-size: .75rem; color: var(--text-muted); }
    .kpi--danger  .kpi__value { color: var(--danger); }
    .kpi--success .kpi__value { color: var(--success); }
    .kpi--warn    .kpi__value { color: var(--warn); }
    .kpi--orange  .kpi__value { color: #FF6B35; }
    /* Tab bar — orange active */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 22px; background: var(--navy-2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 4px; width: fit-content; flex-wrap: wrap; }
    .tab-btn { padding: 7px 16px; border: none; background: transparent; color: var(--text-muted); font-size: .83rem; font-weight: 500; border-radius: var(--r-xs); cursor: pointer; transition: background var(--t), color var(--t); white-space: nowrap; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn--active { background: var(--navy-1); color: #FF6B35; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .tab-panel { display: none; }
    .tab-panel--active { display: block; }
    /* ── Dashboard controls bar ── */
    .dash-controls { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
    .dash-select { background:var(--navy-1); border:1px solid var(--border); border-radius:var(--r-xs); padding:6px 10px; font-size:.82rem; color:var(--text); cursor:pointer; }
    .dash-select:focus { outline:none; border-color:var(--accent); }
    .dash-divider { width:1px; height:20px; background:var(--border); flex-shrink:0; }
    .dash-label { font-size:.78rem; color:var(--text-muted); font-weight:500; }
    .dash-refresh-btn { background:var(--navy-1); border:1px solid var(--border); border-radius:var(--r-xs); padding:6px 12px; font-size:.82rem; color:var(--text); cursor:pointer; }
    .dash-refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
    /* ── Filter bar per tab ── */
    .filter-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .filter-chip { background:var(--navy-2); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:.78rem; color:var(--text-muted); cursor:pointer; transition:all var(--t); }
    .filter-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .filter-input { background:var(--navy-1); border:1px solid var(--border); border-radius:var(--r-xs); padding:4px 10px; font-size:.82rem; color:var(--text); width:180px; }
    .filter-input:focus { outline:none; border-color:var(--accent); }
    /* Tables */
    .data-table-wrap { background: var(--navy-1); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 16px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .data-table th { padding: 10px 14px; text-align: left; font-size: .72rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text-dim); background: var(--navy-2); border-bottom: 1px solid var(--border); }
    .data-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--navy-3); }
    .data-table__empty { padding: 32px; text-align: center; color: var(--text-dim); }
    /* Charts */
    .chart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; margin-bottom: 22px; }
    .chart-card { background: var(--navy-1); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
    .chart-card__title { font-size: .87rem; font-weight: 600; margin-bottom: 14px; }
    .chart-wrap { position: relative; max-height: 280px; }
    /* Severity badges */
    .sev { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: .72rem; font-weight: 700; }
    .sev--critical { background: rgba(220,38,38,.12); color: #dc2626; }
    .sev--warning  { background: rgba(217,119,6,.12);  color: #d97706; }
    .sev--healthy  { background: rgba(22,163,74,.1);   color: #16a34a; }
    /* Broker cards */
    .broker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 22px; }
    .broker-card { background: var(--navy-1); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; }
    .broker-card__header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .broker-card__name { font-size: .95rem; font-weight: 700; }
    .broker-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .bm { }
    .bm__label { font-size: .68rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
    .bm__value { font-size: 1.1rem; font-weight: 700; }
    /* Progress bar */
    .progress-bar { background: var(--navy-3); border-radius: 4px; height: 7px; overflow: hidden; width: 100%; }
    .progress-bar__fill { height: 100%; border-radius: 4px; transition: width .3s; }
    /* Anomaly cards */
    .anomaly-list { display: flex; flex-direction: column; gap: 12px; }
    .anomaly-card { background: var(--navy-1); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; }
    .anomaly-card__header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .anomaly-card__desc { font-size: .88rem; color: var(--text); margin-bottom: 10px; }
    .anomaly-card__recs { font-size: .82rem; color: var(--text-muted); }
    .anomaly-card__recs li { margin: 4px 0; margin-left: 16px; }
    /* Connector task bar */
    .task-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .task-label { font-size: .75rem; color: var(--text-muted); white-space: nowrap; }
    @media (max-width: 768px) { .subnav { padding: 0 20px; } .content { padding: 20px; } .chart-grid { grid-template-columns: 1fr; } .broker-grid { grid-template-columns: 1fr; } }
    #tab-insights hr {
      margin: 8px 0;
      border: none;
      border-top: 1px solid var(--border);
    }
  </style>
  <style>
    @keyframes pulse-badge { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
    @keyframes spin-icon { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .kpi-loading { position: relative; }
    .kpi-loading::after {
      content: '';
      display: inline-block;
      width: 14px; height: 14px;
      margin-left: 6px;
      border: 2px solid #ccc;
      border-top-color: var(--accent, #ff6b35);
      border-radius: 50%;
      animation: spin-icon 0.8s linear infinite;
      vertical-align: middle;
    }
    .cg-table { table-layout: fixed; width: 100%; }
    .cg-table td, .cg-table th { overflow: hidden; text-overflow: ellipsis; }
    .cg-cell { display: flex; align-items: center; gap: 4px; overflow: hidden; }
    .cg-cell-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .cg-cell .copy-icon { flex-shrink: 0; }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="/" class="topbar__brand">
      <span style="font-size:1.1rem;
      font-weight:700;color:#ffffff;
      letter-spacing:1px;
      font-family:inherit;">OPERATIVE</span>
    </a>
    <nav class="topbar__nav">
      <a href="/" class="topbar__link">Agents</a>
      <a href="/admin/" class="topbar__link">Admin</a>
    </nav>
    <div class="topbar__right" style="font-size:.85rem;color:var(--text-muted)">Kafka Analyser</div>
  </header>

  <nav class="subnav">
    <span id="agent-label" style="display:none;position:absolute;right:1.5rem;font-size:.8rem;font-weight:600;color:var(--accent,#0891b2)">Kafka Analyser</span>
    <a href="/chat?agent=kafka-analyser" data-standalone-href="chat.html" class="subnav__link">💬 Chat</a>
    <a href="/agents/kafka-analyser/dashboard" data-standalone-href="dashboard.html" class="subnav__link subnav__link--active">📊 Dashboard</a>
    <a href="/agents/kafka-analyser/reports" data-standalone-href="reports.html" class="subnav__link">📁 Reports</a>
    <a href="/agents/kafka-analyser/settings" data-standalone-href="settings.html" class="subnav__link">⚙ Settings</a>
  </nav>

  <div class="content">
    <div class="page-heading">
      <div>
        <div class="page-heading__title">Kafka Dashboard</div>
        <div class="page-heading__sub">Cluster health, consumer lag, broker metrics and anomaly detection</div>
      </div>
      <button class="btn btn--primary" id="genBtn" onclick="generateAndLoad()" style="display:none">⚡ Generate Synthetic Data</button>
    </div>

    <!-- Dashboard controls bar -->
    <div class="dash-controls" id="dash-controls" style="display:none">
      <span class="dash-label">Cluster</span>
      <select class="dash-select" id="ctrl-cluster">
        <option value="">Loading…</option>
      </select>
      <div class="dash-divider"></div>
      <span class="dash-label">Time</span>
      <select class="dash-select" id="ctrl-time">
        <option value="5m">Last 5 mins</option>
        <option value="1h">Last 1 hour</option>
        <option value="6h">Last 6 hours</option>
        <option value="24h" selected>Last 24 hours</option>
        <option value="7d">Last 7 days</option>
      </select>
      <div class="dash-divider"></div>
      <span class="dash-label">Refresh</span>
      <select class="dash-select" id="ctrl-refresh">
        <option value="0">Off</option>
        <option value="30">30s</option>
        <option value="60">1 min</option>
        <option value="300">5 min</option>
      </select>
      <button class="dash-refresh-btn" id="ctrl-refresh-now" title="Refresh now">↺ Refresh</button>
    </div>

    <div class="tab-bar">
      <button class="tab-btn tab-btn--active" data-tab="overview"        onclick="switchTab('overview',this)">Cluster Overview</button>
      <button class="tab-btn"                 data-tab="brokers"         onclick="switchTab('brokers',this)">Brokers</button>
      <button class="tab-btn"                 data-tab="topics"          onclick="switchTab('topics',this)">Topics</button>
      <button class="tab-btn"                 data-tab="consumer-groups" onclick="switchTab('consumer-groups',this)">Consumer Groups</button>
      <button class="tab-btn"                 data-tab="zookeeper"       onclick="switchTab('zookeeper',this)">ZooKeeper</button>
      <button class="tab-btn"                 data-tab="kafka-connect"   onclick="switchTab('kafka-connect',this)">Kafka Connect</button>
      <button class="tab-btn"                 data-tab="schema-registry" onclick="switchTab('schema-registry',this)">Schema Registry</button>
      <button class="tab-btn"                 data-tab="mirrormaker"     onclick="switchTab('mirrormaker',this)">MirrorMaker</button>
      <button class="tab-btn"                 data-tab="insights"        onclick="switchTab('insights',this)">AI Insights</button>
    </div>

    <div id="tab-overview"        class="tab-panel tab-panel--active"></div>
    <div id="tab-consumer-groups" class="tab-panel"></div>
    <div id="tab-topics"          class="tab-panel"></div>
    <div id="tab-brokers"         class="tab-panel"></div>
    <div id="tab-schema-registry" class="tab-panel"></div>
    <div id="tab-zookeeper" class="tab-panel"></div>
    <div id="tab-kafka-connect" class="tab-panel"></div>
    <div id="tab-mirrormaker" class="tab-panel"></div>
    <div id="tab-insights"        class="tab-panel"></div>
  </div>

  <script>
    // ── Standalone mode: stub portal dependencies ─────────────────────────
    if (typeof window._authHeaders !== 'function') {
      window.BACKEND_URL = '';
      window._authHeaders = () => ({});
      window.portalReady = Promise.resolve();
      window.showToast = (msg, type) => console.log('[toast]', type || 'info', msg);
    }
  </script>
  <script>
    // ── Dual-mode detection: works inside Operative portal AND standalone ──
    const _isPortalMode = (typeof window._isPortalEnv !== 'undefined' && window._isPortalEnv === true);
  </script>
  <script>
    const SLUG  = 'kafka-analyser';
    const PROXY = _isPortalMode ? `${BACKEND_URL}/api/agents/${SLUG}/proxy` : '';

    const charts = {};
    const _loaded = new Set();

    // ── API helper ───────────────────────────────────────────────────────────

    function _getMinutes() {
      const v = document.getElementById('ctrl-time').value;
      if (v === '5m') return 5;
      if (v === '1h') return 60;
      if (v === '6h') return 360;
      if (v === '24h') return 1440;
      if (v === '7d') return 10080;
      return 1440;
    }
    function _getHours() { return _getMinutes() / 60; }
    async function api(path, opts = {}) {
      const params = new URLSearchParams();
      if (_currentClusterId) params.set('cluster_id', _currentClusterId);
      const mins = _getMinutes();
      if (mins) params.set('minutes', mins);
      const qs = params.toString();
      const url = qs ? `${PROXY}${path}?${qs}` : `${PROXY}${path}`;
      const res = await fetch(url, {
        ...opts,
        headers: { ..._authHeaders(), ...opts.headers },
        cache: 'no-store',
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(e.detail || `HTTP ${res.status}`);
      }
      return res.json();
    }

    // ── Formatters ───────────────────────────────────────────────────────────

    function fmtNum(n) { return (n ?? 0).toLocaleString(); }
    function fmtRate(n) {
      if (!n) return '0/s';
      if (n >= 1e6) return (n/1e6).toFixed(1) + 'M/s';
      if (n >= 1e3) return Math.round(n/1e3) + 'K/s';
      return n + '/s';
    }
    function fmtBytes(b) {
      if (!b) return '0 B';
      if (b >= 1e12) return (b/1e12).toFixed(1) + ' TB';
      if (b >= 1e9)  return (b/1e9).toFixed(1)  + ' GB';
      if (b >= 1e6)  return (b/1e6).toFixed(1)  + ' MB';
      return Math.round(b/1e3) + ' KB';
    }
    function metricColor(pct) {
      if (pct >= 80) return 'var(--danger)';
      if (pct >= 60) return '#d97706';
      return 'var(--success)';
    }
    function sevBadge(sev) {
      return `<span class="sev sev--${sev}">${sev.toUpperCase()}</span>`;
    }
    function stateBadge(state) {
      const styles = {
        'Stable':      'background:rgba(22,163,74,.1);color:#16a34a',
        'Rebalancing': 'background:rgba(234,88,12,.1);color:#ea580c',
        'Dead':        'background:rgba(220,38,38,.1);color:#dc2626',
        'Empty':       'background:rgba(100,116,139,.12);color:#64748b',
        'Unknown':     'background:rgba(100,116,139,.12);color:#64748b',
      };
      const s = styles[state] || 'background:rgba(99,102,241,.1);color:#6366f1';
      return `<span style="${s};padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:700">${state}</span>`;
    }
    function trendCell(trend, rate) {
      if (trend === 'growing')    return `<span style="color:var(--danger);font-weight:600">▲ growing</span>`;
      if (trend === 'recovering') return `<span style="color:var(--success)">▼ recovering</span>`;
      return `<span style="color:var(--text-muted)">→ stable</span>`;
    }

    // ── Helpers ──────────────────────────────────────────────────────────────

    function skeletonHTML() {
      return `<div style="display:flex;flex-direction:column;gap:12px;padding:4px 0">
        ${[80,60,90,70].map(w=>`<div class="skeleton" style="height:14px;width:${w}%"></div>`).join('')}
      </div>`;
    }
    function emptyState(icon, title, sub) {
      return `<div class="empty-state"><div class="empty-state__icon">${icon}</div>
        <div class="empty-state__title">${title}</div>
        <div class="empty-state__sub">${sub || ''}</div></div>`;
    }
    function destroyChart(k) { if (charts[k]) { charts[k].destroy(); delete charts[k]; } }

    // ── Tab switching ─────────────────────────────────────────────────────────

    function _clusterId() {
      const sel = document.querySelector('#ctrl-cluster');
      return sel ? sel.value : '';
    }
    function _base() {
      // Reuse the same PROXY base that api() uses
      return typeof PROXY !== 'undefined' ? PROXY : '';
    }
    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('tab-panel--active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-btn--active'));
      document.getElementById('tab-' + name).classList.add('tab-panel--active');
      btn.classList.add('tab-btn--active');
      if (!_loaded.has(name)) loadTab(name);
    }

    // ── Per-tab loading ──────────────────────────────────────────────────────

    async function loadTab(name) {
      const el = document.getElementById('tab-' + name);
      el.innerHTML = skeletonHTML();

      // Fetch real cluster counts for KPI cards — always refresh
      try {
        const counts = await api('/dashboard/counts');
        if (!counts.empty) window._clusterCounts = counts;
      } catch(e) { console.warn('counts fetch failed', e); }

      try {
        switch (name) {
          case 'overview': {
            const [ov, cg, tp] = await Promise.all([
              api('/dashboard/overview'),
              api('/dashboard/consumer-groups').catch(() => ({ consumer_groups: [] })),
              api('/dashboard/topics').catch(() => ({ topics: [] })),
            ]);
            _loaded.add(name);
            renderOverview(ov, (cg.consumer_groups || []), tp);
            break;
          }
          case 'consumer-groups': {
            const d = await api('/dashboard/consumer-groups');
            _loaded.add(name);
            renderConsumerGroups(d);
            // Only stream if lag data not yet available (background scan may have enriched cache)
            const hasLagData = (d.consumer_groups || []).some(g => g.total_lag > 0 || g.topic);
            if (!hasLagData) {
              _streamGroupLags();
            } else {
              // Cache already has lag — update KPIs immediately
              if (window._cgGroups) {
                _updateGroupKPIs(window._cgGroups, true);
                // Render chart from cached data
                const hasLag = window._cgGroups.some(g => g.total_lag > 0);
                const chartCanvas = document.getElementById('cg-lag-chart');
                const chartContainer = document.getElementById('cg-chart-container');
                if (hasLag && chartCanvas) {
                  const top10 = window._cgGroups.filter(g => g.total_lag > 0).sort((a,b) => b.total_lag - a.total_lag).slice(0, 10);
                  if (charts['cgLag']) { charts['cgLag'].destroy(); charts['cgLag'] = null; }
                  if (chartContainer) chartContainer.style.maxHeight = '350px';
                  charts['cgLag'] = new Chart(chartCanvas, {
                    type: 'bar',
                    data: {
                      labels: top10.map(g => g.group_id.length > 35 ? g.group_id.slice(0,32)+'...' : g.group_id),
                      datasets: [{
                        label: 'Total Lag',
                        data: top10.map(g => g.total_lag),
                        backgroundColor: top10.map(g => g.total_lag > 10000 ? '#e74c3c' : g.total_lag > 1000 ? '#f39c12' : '#27ae60'),
                      }]
                    },
                    options: {
                      indexAxis: 'y',
                      responsive: true,
                      maintainAspectRatio: true,
                      plugins: { legend: { display: false } },
                      scales: { x: { title: { display: true, text: 'Total Lag' } } }
                    }
                  });
                }
                // Hide no-lag banner if lag exists
                const noLagBanner = document.getElementById('cg-no-lag-banner');
                if (noLagBanner && hasLag) noLagBanner.style.display = 'none';
              }
            }
            break;
          }
          case 'topics': {
            const d = await api('/dashboard/topics');
            _loaded.add(name);
            renderTopics(d);
            // Only stream if topics not yet described (background scan may have enriched cache)
            const hasTopicData = (d.topics || []).some(t => t.partition_count > 0);
            if (!hasTopicData) {
              _streamTopicDetails();
            } else {
              // Cache already has described topics — update KPIs immediately
              if (window._topicAllTopics) {
                _updateTopicKPIs(window._topicAllTopics, 0, 0, true);
              }
            }
            break;
          }
          case 'brokers': {
            const d = await api('/dashboard/brokers');
            _loaded.add(name);
            renderBrokers(d);
            break;
          }
          case 'insights': {
            const d = await api('/dashboard/insights');
            _loaded.add(name);
            renderInsights(d);
            break;
          }
          case 'schema-registry': {
            const d = await api('/dashboard/schema-registry');
            renderSchemaRegistry(d);
            break;
          }
          case 'zookeeper': {
            const d = await api('/dashboard/zookeeper');
            renderZooKeeper(d);
            break;
          }
          case 'kafka-connect': {
            const d = await api('/dashboard/kafka-connect');
            renderKafkaConnect(d);
            break;
          }
          case 'mirrormaker': {
            const d = await api('/dashboard/mirrormaker');
            renderMirrorMaker(d);
            break;
          }
        }
      } catch (e) {
        document.getElementById('tab-' + name).innerHTML =
          emptyState('⚠', 'Failed to load', e.message);
      }
    }

    // ── Generate & reload ────────────────────────────────────────────────────

    async function generateAndLoad() {
      const btn = document.getElementById('genBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Generating…';
      try {
        const d = await api('/reports/generate-sample', { method: 'POST' });
        showToast(d.message || 'Synthetic data generated', 'success');
        window._clusterCounts = null;
        _loaded.clear();
        // Reload current active tab
        const activeBtn = document.querySelector('.tab-btn--active');
        const activeTab = activeBtn ? activeBtn.dataset.tab : 'overview';
        loadTab(activeTab);
      } catch (e) {
        showToast('Generation failed: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '⚡ Generate Synthetic Data';
      }
    }

    // ── Tab 1: Cluster Overview ──────────────────────────────────────────────

    function renderOverview(data, consumerGroups, topicsData) {
      if (data.empty) {
        document.getElementById('tab-overview').innerHTML = emptyState('🔌',
          'No cluster data loaded',
          `Click "Generate Synthetic Data" above, or configure a Kafka source on the <a href="${_isPortalMode ? '/agents/kafka-analyser/settings' : 'settings.html'}">Settings</a> page.`);
        return;
      }

      const cluster   = data.cluster   || {};
      const brokers   = data.brokers   || [];
      const anomalies = data.anomalies || [];
      const groups    = consumerGroups || [];
      const topics    = (topicsData && topicsData.topics) || [];
      const connectors = (data.connectors || (topicsData && topicsData.connectors)) || [];

      const msgOf   = t => (t.messages_in_per_sec ?? t.msgs_per_sec ?? 0);
      const partsOf = t => (t.partition_count ?? t.partitions ?? 0);
      const urpOf   = t => (t.under_replicated_partitions ?? t.urp_count ?? 0);
      const nameOf  = t => (t.name || t.topic || 'Unknown');

      const GREEN = '#16a34a', ORANGE = '#d97706', RED = '#dc2626';

      // ── KPI metrics ─────────────────────────────────────────────────────────
      const brokerCount      = cluster.broker_count || brokers.length;
      const allBrokersHealthy = brokers.length > 0 && brokers.every(b => b.status === 'healthy');
      const topicCount       = (window._clusterCounts || {}).total_topics || topics.length || cluster.topic_count || 0;
      const partitionCount   = (window._clusterCounts || {}).total_partitions || topics.reduce((s, t) => s + (t.partition_count || 0), 0);
      const consumerGroupCount = (window._clusterCounts || {}).total_groups || groups.length;
      const totalURPs        = brokers.reduce((s, b) => s + (b.urp_count || 0), 0);
      const healthScore      = cluster.health_score || 0;
      const criticalCount    = cluster.critical_count || 0;

      const healthClass = healthScore >= 100 ? 'kpi--success' : healthScore > 80 ? 'kpi--warn' : 'kpi--danger';

      const kpis = `
        <div class="kpi-grid">
          <div class="kpi ${allBrokersHealthy ? 'kpi--success' : 'kpi--danger'}">
            <div class="kpi__label">Brokers Online</div>
            <div class="kpi__value">${brokers.length}/${brokerCount}</div>
            <div class="kpi__sub">${cluster.name || 'cluster'}</div>
          </div>
          <div class="kpi kpi--orange">
            <div class="kpi__label">Topics</div>
            <div class="kpi__value">${topicCount.toLocaleString()}</div>
            <div class="kpi__sub">topics</div>
          </div>
          <div class="kpi kpi--orange">
            <div class="kpi__label">Partitions</div>
            <div class="kpi__value">${partitionCount.toLocaleString()}</div>
            <div class="kpi__sub">across all topics</div>
          </div>
          <div class="kpi kpi--orange">
            <div class="kpi__label">Consumer Groups</div>
            <div class="kpi__value">${consumerGroupCount.toLocaleString()}</div>
            <div class="kpi__sub">active</div>
          </div>
          <div class="kpi ${totalURPs > 0 ? 'kpi--danger' : 'kpi--success'}">
            <div class="kpi__label">Under-Replicated Partitions</div>
            <div class="kpi__value">${totalURPs}</div>
            <div class="kpi__sub">partitions</div>
          </div>
          <div class="kpi ${healthClass}">
            <div class="kpi__label">Health Score</div>
            <div class="kpi__value">${healthScore}</div>
            <div class="kpi__sub">${criticalCount} critical issue${criticalCount !== 1 ? 's' : ''}</div>
          </div>
        </div>`;

      // ── Cluster health strip ────────────────────────────────────────────────
      const pill = (label, color) => `
        <span style="display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:999px;background:var(--navy-2);border:1px solid var(--border);font-size:.8rem;font-weight:600;color:var(--text)">
          <span style="width:9px;height:9px;border-radius:50%;background:${color};flex-shrink:0"></span>${label}
        </span>`;

      const brokersColor = brokers.some(b => b.status !== 'healthy') ? RED : GREEN;

      const anyTopicURP   = topics.some(t => urpOf(t) > 0 || t.status === 'critical');
      const anyTopicStale = topics.some(t => msgOf(t) === 0);
      const topicsColor   = anyTopicURP ? RED : anyTopicStale ? ORANGE : GREEN;

      const criticalGroups = groups.filter(g => (g.total_lag || 0) > 10000).length;
      const warningGroups  = groups.filter(g => (g.total_lag || 0) > 1000 && (g.total_lag || 0) <= 10000).length;
      const lagColor = criticalGroups > 0 ? RED : warningGroups > 0 ? ORANGE : GREEN;

      const connectorsPill = connectors.length
        ? pill('Connectors', connectors.some(c => (c.state || c.status) === 'FAILED') ? RED : GREEN)
        : '';

      const healthStrip = `
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px">
          ${pill('Brokers', brokersColor)}
          ${pill('Topics', topicsColor)}
          ${pill('Consumer Lag', lagColor)}
          ${connectorsPill}
        </div>`;

      // ── Charts ──────────────────────────────────────────────────────────────
      const overviewCharts = `
        <div style="display:flex;gap:18px;flex-wrap:wrap;margin-bottom:22px">
          <div class="chart-card" style="flex:1;min-width:300px;margin-bottom:0">
            <div class="chart-card__title">Cluster Activity — Messages/sec Over Time</div>
            <div class="chart-wrap" id="overview-activity-wrap" style="height:220px"><canvas id="overview-activity-chart"></canvas></div>
          </div>
          <div class="chart-card" style="flex:1;min-width:300px;margin-bottom:0">
            <div class="chart-card__title">Partition Distribution by Topic</div>
            <div class="chart-wrap" style="height:220px"><canvas id="overview-partitions-chart"></canvas></div>
          </div>
        </div>`;

      const topByParts = [...topics].sort((a, b) => partsOf(b) - partsOf(a)).slice(0, 10);

      // ── Broker health summary (compact) ─────────────────────────────────────
      const brokerCards = brokers.map(b => `
          <div class="broker-card">
            <div class="broker-card__header">
              <span class="broker-card__name">Broker ID: ${(b.broker_id ?? b.id ?? 'Broker')}</span>
              <span class="sev sev--${b.heap_pct === 0 && b.messages_in_per_sec === 0 && b.produce_latency_ms === 0 ? 'warning' : b.status === 'healthy' ? 'healthy' : b.status === 'warning' ? 'warning' : 'critical'}">${b.heap_pct === 0 && b.messages_in_per_sec === 0 && b.produce_latency_ms === 0 ? '⚠ METRICS UNAVAILABLE' : b.status.toUpperCase()}</span>
            </div>
            <div class="broker-metrics">
              <div class="bm"><div class="bm__label">Heap</div><div class="bm__value" style="color:${metricColor(b.heap_pct)}">${b.heap_pct}%</div></div>
              <div class="bm"><div class="bm__label">CPU</div><div class="bm__value" style="color:${metricColor(b.cpu_pct)}">${b.cpu_pct}%</div></div>
              <div class="bm"><div class="bm__label">URPs</div><div class="bm__value" style="color:${b.urp_count > 0 ? 'var(--danger)' : 'var(--success)'}">${b.urp_count}</div></div>
              <div class="bm"><div class="bm__label">GC Pauses</div><div class="bm__value" style="color:${(b.gc_pause_count ?? b.gc_pause_ms ?? 0) > 0 ? '#d97706' : 'var(--success)'}">${(b.gc_pause_count ?? b.gc_pause_ms ?? 0)}</div></div>
            </div>
          </div>`).join('');

      // ── Anomalies table ─────────────────────────────────────────────────────
      const anomalyRows = anomalies.length
        ? anomalies.map(a => `
            <tr>
              <td>${sevBadge(a.severity)}</td>
              <td style="font-size:.78rem;color:var(--text-muted);text-transform:uppercase;font-weight:600">${a.category.replace(/_/g,' ')}</td>
              <td>${a.description}</td>
            </tr>`).join('')
        : `<tr><td colspan="3" class="data-table__empty">✅ No active anomalies</td></tr>`;

      document.getElementById('tab-overview').innerHTML =
        kpis + healthStrip + overviewCharts + `
        <div class="chart-card__title">Broker Health</div>
        <div class="broker-grid">${brokerCards}</div>
        <div class="chart-card__title">Active Anomalies</div>
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr><th>Severity</th><th>Category</th><th>Description</th></tr></thead>
            <tbody>${anomalyRows}</tbody>
          </table>
        </div>`;

      setTimeout(async () => {
        if (window._overviewActivityChart) { window._overviewActivityChart.destroy(); window._overviewActivityChart = null; }
        const activityWrap = document.getElementById('overview-activity-wrap');
        const noData = () => {
          if (activityWrap) {
            activityWrap.innerHTML =
              `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:.85rem">No historical data available</div>`;
          }
        };
        const activityCtx = document.getElementById('overview-activity-chart')?.getContext('2d');
        if (activityCtx) {
          try {
            const clusterId = window._currentClusterId
              || (typeof _currentClusterId !== 'undefined' ? _currentClusterId : null)
              || document.getElementById('ctrl-cluster')?.value;
            const qs = new URLSearchParams();
            qs.set('minutes', String(_getMinutes()));
            if (clusterId) qs.set('cluster_id', clusterId);
            const hist = await fetch(`${PROXY}/dashboard/topics/history?${qs.toString()}`,
              { headers: _authHeaders(), cache: 'no-store' }).then(r => r.json());

            if (hist.empty || !hist.series || !hist.series.length || !hist.labels || !hist.labels.length) {
              noData();
            } else {
              const timeVal = document.getElementById('ctrl-time').value;
              let _lastDateLabel = '';
              const labels = hist.labels.map(l => {
                const d = new Date(l);
                if (timeVal === '7d') {
                  return d.toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short' });
                } else if (timeVal === '24h') {
                  const dayLabel = d.toLocaleDateString([], { weekday: 'short' });
                  const timeLabel = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                  if (dayLabel !== _lastDateLabel) { _lastDateLabel = dayLabel; return dayLabel + ' ' + timeLabel; }
                  return timeLabel;
                } else {
                  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
              });
              const totals = hist.labels.map((_, i) =>
                hist.series.reduce((sum, s) => sum + ((s.values && s.values[i]) || 0), 0));
              window._overviewActivityChart = new Chart(activityCtx, {
                type: 'line',
                data: {
                  labels,
                  datasets: [{
                    label: 'Messages/sec',
                    data: totals,
                    borderColor: '#FF6B35',
                    backgroundColor: 'rgba(255,107,53,0.1)',
                    borderWidth: 2,
                    pointRadius: labels.length < 20 ? 3 : 0,
                    tension: 0.3,
                    fill: true,
                  }],
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false }, title: { display: false } },
                  scales: {
                    x: { ticks: { maxTicksLimit: 12, font: { size: 10 }, maxRotation: 45 } },
                    y: { ticks: { callback: v => fmtRate(v), font: { size: 10 } }, beginAtZero: true },
                  },
                },
              });
            }
          } catch (e) {
            console.warn('Overview activity chart failed:', e);
            noData();
          }
        }

        if (window._overviewPartitionsChart) { window._overviewPartitionsChart.destroy(); window._overviewPartitionsChart = null; }
        const partsCtx = document.getElementById('overview-partitions-chart')?.getContext('2d');
        if (partsCtx) {
          window._overviewPartitionsChart = new Chart(partsCtx, {
            type: 'bar',
            data: {
              labels: topByParts.map(nameOf),
              datasets: [{ label: 'Partitions', data: topByParts.map(partsOf), backgroundColor: '#4FC3F7', borderWidth: 0 }],
            },
            options: {
              indexAxis: 'y',
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false }, title: { display: false } },
              scales: {
                x: { ticks: { callback: v => fmtNum(v), font: { size: 10 } }, beginAtZero: true },
                y: { ticks: { font: { size: 10 } } },
              },
            },
          });
        }
      }, 0);
    }

    // ── Tab 2: Consumer Groups ────────────────────────────────────────────────

    function renderConsumerGroups(data) {
      if (data.empty) {
        document.getElementById('tab-consumer-groups').innerHTML = emptyState('📭', 'No data', 'Generate synthetic data first.');
        return;
      }
      const groups = data.consumer_groups || [];
      window._cgGroups = groups;
      const cgRowHtml = g => {
        const lagColor = g.lag_trend === 'growing' && g.total_lag > 10000 ? 'style="color:var(--danger);font-weight:700"' : '';
        let trendHtml;
        if (g.lag_trend === 'growing') {
          const color = g.total_lag > 1000 ? 'var(--danger)' : '#d97706';
          trendHtml = `<span style="color:${color};font-weight:600">↑ growing</span>`;
        } else if (g.lag_trend === 'shrinking') {
          trendHtml = `<span style="color:var(--success);font-weight:600">↓ shrinking</span>`;
        } else {
          trendHtml = `<span style="color:var(--text-muted)">→ stable</span>`;
        }
        const groupId = g.group_id || g.group_name || 'Unknown';
        const topicName = g.topic || (g.partitions && g.partitions[0] && g.partitions[0].topic) || '-';
        const copyBtn = `<span class="copy-icon" onclick="event.stopPropagation();var t=this.closest('td').getAttribute('data-copy');var el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);this.textContent='✓';setTimeout(()=>this.textContent='📋',1000)" style="cursor:pointer;font-size:12px;opacity:0.3;transition:opacity 0.2s" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.3'">📋</span>`;
        return `<tr>
          <td data-copy="${groupId}" title="${groupId}"><div class="cg-cell"><span class="cg-cell-text" style="font-weight:600">${groupId}</span>${copyBtn}</div></td>
          <td data-copy="${topicName}" title="${topicName}"><div class="cg-cell"><span class="cg-cell-text"><code style="font-size:.8rem">${topicName}</code></span>${topicName !== '-' ? copyBtn : ''}</div></td>
          <td ${lagColor}>${fmtNum(g.total_lag)}</td>
          <td>${trendHtml}</td>
          <td style="font-size:.82rem;color:var(--text-muted)">${g.lag_rate_per_min > 0 ? '+' : ''}${fmtNum(g.lag_rate_per_min)}/min</td>
          <td>${stateBadge(g.state)}</td>
          <td><span class="sev sev--${g.total_lag > 10000 ? 'critical' : g.total_lag > 1000 ? 'warning' : 'healthy'}">${g.total_lag > 10000 ? 'CRITICAL' : g.total_lag > 1000 ? 'WARNING' : 'HEALTHY'}</span></td>
        </tr>`;
      };

      const cgFilters = `
        <div class="filter-bar">
          <span class="dash-label">State:</span>
          <span class="filter-chip active" onclick="window._cgSetState('all',this)">All</span>
          <span class="filter-chip" onclick="window._cgSetState('active',this)">Active</span>
          <span class="filter-chip" onclick="window._cgSetState('empty',this)">Empty</span>
          <input class="filter-input" id="cg-search" placeholder="Search group…" oninput="_serverGroupSearch(this.value)" />
        </div>
        <div class="filter-bar">
          <span class="dash-label">Health:</span>
          <span class="filter-chip active" onclick="window._cgSetFilter('all',this)">All</span>
          <span class="filter-chip" onclick="window._cgSetFilter('critical',this)">Critical</span>
          <span class="filter-chip" onclick="window._cgSetFilter('warning',this)">Warning</span>
          <span class="filter-chip" onclick="window._cgSetFilter('healthy',this)">Healthy</span>
        </div>
      `;

      const totalGroups   = groups.length;
      const criticalCount = groups.filter(g => g.total_lag > 10000).length;
      const warningCount  = groups.filter(g => g.total_lag > 1000 && g.total_lag <= 10000).length;
      const healthyCount  = groups.filter(g => g.total_lag <= 1000).length;

      const cgKpis = `
        <div class="kpi-grid">
          <div class="kpi kpi--orange">
            <div class="kpi__label">Total Groups</div>
            <div class="kpi__value">${totalGroups}</div>
            <div class="kpi__sub">consumer groups</div>
          </div>
          <div class="kpi kpi--danger">
            <div class="kpi__label">Critical</div>
            <div class="kpi__value">${criticalCount}</div>
            <div class="kpi__sub">lag &gt; 10,000</div>
          </div>
          <div class="kpi kpi--warn">
            <div class="kpi__label">Warning</div>
            <div class="kpi__value">${warningCount}</div>
            <div class="kpi__sub">lag 1,001–10,000</div>
          </div>
          <div class="kpi kpi--success">
            <div class="kpi__label">Healthy</div>
            <div class="kpi__value">${healthyCount}</div>
            <div class="kpi__sub">lag &le; 1,000</div>
          </div>
        </div>`;

      const topLag = [...groups]
        .sort((a, b) => (b.total_lag || 0) - (a.total_lag || 0))
        .slice(0, 10);
      const hasLag = groups.some(g => (g.total_lag || 0) > 0);

      // Always render chart canvas + banner (banner hidden when lag exists)
      // Chart will be populated after streaming enriches lag data
      const cgChart = '<div style="font-weight:600;font-size:.85rem;color:var(--text-muted);margin-bottom:8px">TOP 10 CONSUMER GROUPS BY LAG</div><div id="cg-chart-container"><canvas id="cg-lag-chart" height="300"></canvas></div>' +
        '<div id="cg-no-lag-banner" class="filter-bar" style="color:var(--text-muted);padding:16px;text-align:center;' + (hasLag ? 'display:none' : '') + '">ℹ️ No active consumer lag detected — consumers are keeping up or no active subscribers</div>';

      document.getElementById('tab-consumer-groups').innerHTML = '<div style="text-align:center;padding:8px 0;"><span id="cg-loading-badge" style="display:none;align-items:center;gap:8px;padding:8px 20px;background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;border-radius:20px;font-size:14px;font-weight:600;box-shadow:0 2px 8px rgba(255,107,53,0.3);animation:pulse-badge 1.5s ease-in-out infinite;">⟳ Loading topics...</span></div>' + cgKpis + cgChart + cgFilters + `
        <div class="chart-card__title">Consumer Group Inventory</div>
        <div class="data-table-wrap">
          <table class="data-table cg-table">
            <thead><tr><th style="width:22%;max-width:220px">Group</th><th style="width:25%;max-width:250px">Topic</th><th style="width:10%">Total Lag</th><th style="width:10%">Trend</th><th style="width:10%">Rate/min</th><th style="width:10%">State</th><th style="width:8%">Status</th></tr></thead>
            <tbody id="cg-tbody"></tbody>
          </table>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px">
          <span id="cg-count-label" class="dash-label"></span>
          <button id="cg-show-more" class="btn btn--secondary btn--sm" onclick="window._cgShowMore()">Show More</button>
        </div>`;

      // Override total with real cluster count, show spinner on computed KPIs
      const _realGroupTotal = (window._clusterCounts || {}).total_groups;
      if (_realGroupTotal) {
        const _kpis = document.querySelectorAll('#tab-consumer-groups .kpi__value');
        if (_kpis.length >= 4) {
          _kpis[0].textContent = _realGroupTotal.toLocaleString();
          _kpis[1].classList.add('kpi-loading');
          _kpis[2].classList.add('kpi-loading');
          _kpis[3].classList.add('kpi-loading');
        }
      }

      // ── Self-contained consumer-group table view: pagination + filters + search (AND) ──
      const CG_PAGE = 20;
      window._cgView = { state: 'all', filter: 'all', search: '', visible: CG_PAGE };

      const cgMatches = (g, st) => {
        const name = (g.group_id || g.group_name || 'Unknown');
        if (st.search && !name.toLowerCase().includes(st.search.toLowerCase())) return false;
        const gState = (g.state || '').toLowerCase();
        if (st.state === 'active' && gState === 'empty') return false;
        if (st.state === 'empty' && gState !== 'empty') return false;
        const lag = g.total_lag || 0;
        switch (st.filter) {
          case 'critical': return lag > 10000;
          case 'warning':  return lag > 1000 && lag <= 10000;
          case 'healthy':  return lag <= 1000;
          default:         return true;
        }
      };

      window._cgApplyView = function () {
        const st = window._cgView;
        const filtered = groups.filter(g => cgMatches(g, st));
        const shown = filtered.slice(0, st.visible);
        const tbody = document.getElementById('cg-tbody');
        if (tbody) {
          tbody.innerHTML = shown.map(cgRowHtml).join('') ||
            `<tr><td colspan="7" class="data-table__empty">No consumer groups match</td></tr>`;
        }
        const label = document.getElementById('cg-count-label');
        if (label) {
          const _tot = (st.state === 'all' && st.filter === 'all' && !st.search)
            ? ((window._clusterCounts || {}).total_groups || filtered.length)
            : filtered.length;
          label.textContent = `Showing ${shown.length} of ${_tot.toLocaleString()} groups`;
        }
        const moreBtn = document.getElementById('cg-show-more');
        if (moreBtn) moreBtn.style.display = shown.length < filtered.length ? '' : 'none';
      };

      const cgSetActiveChip = (el) => {
        el.parentElement.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
      };

      window._cgSetState = function (state, el) {
        window._cgView.state = state;
        window._cgView.visible = CG_PAGE; // reset Show More on filter change
        cgSetActiveChip(el);
        window._cgApplyView();
      };
      window._cgSetFilter = function (f, el) {
        window._cgView.filter = f;
        window._cgView.visible = CG_PAGE;
        cgSetActiveChip(el);
        window._cgApplyView();
      };
      window._cgSearch = function (val) {
        window._cgView.search = val;
        window._cgView.visible = CG_PAGE;
        window._cgApplyView();
      };
      window._cgShowMore = function () {
        window._cgView.visible += CG_PAGE;
        window._cgApplyView();
      };

      window._cgApplyView();

      if (hasLag) {
        setTimeout(() => {
          if (charts['cgLag']) { charts['cgLag'].destroy(); charts['cgLag'] = null; }
          const ctx = document.getElementById('cg-lag-chart')?.getContext('2d');
          if (!ctx) return;
          charts['cgLag'] = new Chart(ctx, {
            type: 'bar',
            data: {
              labels: topLag.map(g => (g.group_id || g.group_name || 'Unknown')),
              datasets: [{
                label: 'Total Lag',
                data: topLag.map(g => g.total_lag || 0),
                backgroundColor: topLag.map(g =>
                  g.total_lag > 10000 ? '#dc2626'
                  : (g.total_lag > 1000 && g.lag_trend === 'growing') ? '#d97706'
                  : g.total_lag > 1000 ? '#FFC107'
                  : '#16a34a'),
                borderWidth: 0,
              }],
            },
            options: {
              indexAxis: 'y',
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false }, title: { display: false } },
              scales: {
                x: { ticks: { callback: v => fmtNum(v), font: { size: 10 } }, beginAtZero: true },
                y: { ticks: { font: { size: 10 } } },
              },
            },
          });
        }, 0);
      }
      window._renderTabAI('consumer-groups', document.getElementById('tab-consumer-groups'));
    }

    // ── Tab 3: Topics ─────────────────────────────────────────────────────────

    function renderTopics(data) {
      if (data.empty) {
        document.getElementById('tab-topics').innerHTML = emptyState('📬', 'No data', 'Generate synthetic data first.');
        return;
      }
      const topics = (data.topics || []).slice(0, 10);

      const topicStatusBadge = t => {
        if (logSize(t) > 1000 && msgRate(t) === 0) return `<span class="sev" style="background:rgba(100,116,139,.12);color:var(--text-muted)">STALE</span>`;
        if (topicLowRep(t)) return `<span style="background:#666;color:#fff;padding:2px 8px;border-radius:4px;font-size:.72rem">LOW-REP</span>`;
        return `<span class="sev sev--healthy">HEALTHY</span>`;
      };

      const topicRowHtml = t => `<tr>
          <td style="font-weight:600"><code style="font-size:.8rem">${(t.name || t.topic || 'Unknown')}</code></td>
          <td style="text-align:center">${(t.partition_count || t.partitions || 0)}</td>
          <td style="text-align:center">${t.replication_factor}</td>
          <td>${fmtRate(t.messages_in_per_sec)}</td>
          <td style="font-size:.82rem;color:var(--text-muted)">${fmtBytes(t.bytes_in_per_sec || 0)}/s</td>
          <td style="text-align:right;font-size:.82rem">${fmtBytes(t.size_bytes || 0)}</td>
          <td>${topicStatusBadge(t)}</td>
        </tr>`;

      const topicFilters = `
        <div class="filter-bar">
          <span class="dash-label">Show:</span>
          <span class="filter-chip active" onclick="window._setTopicShow(false,this)">All</span>
          <span class="filter-chip" onclick="window._setTopicShow(true,this)">User Topics</span>
          <input class="filter-input" id="topic-search" placeholder="Search topic…" oninput="_serverTopicSearch(this.value)" />
        </div>
        <div class="filter-bar">
          <span class="dash-label">Filter:</span>
          <span class="filter-chip active" onclick="window._setTopicFilter('all',this)">All</span>
          <span class="filter-chip" onclick="window._setTopicFilter('anomalous',this)">Anomalous Only</span>
          <span class="filter-chip" onclick="window._setTopicFilter('high',this)">High Traffic</span>
          <span class="filter-chip" onclick="window._setTopicFilter('stale',this)">Stale</span>
          <span class="filter-chip" onclick="window._setTopicFilter('underrep',this)">Low Replication</span>
        </div>
      `;

      const allTopics = data.topics || [];
      window._topicAllTopics = allTopics;
      const msgRate = t => (t.msgs_per_sec ?? t.messages_in_per_sec ?? 0);
      const logSize = t => (t.log_size_bytes ?? t.size_bytes ?? 0);
      const topicRf = t => (t.replication_factor ?? t.rf ?? 0);
      const topicParts = t => (t.partition_count ?? t.partitions ?? 0);
      const topicLowRep = t => topicRf(t) === 1;

      const totalTopics      = allTopics.length;
      const highTraffic      = allTopics.filter(t => msgRate(t) > 1000).length;
      const lowReplication   = (window._clusterCounts || {}).total_rf1 != null ? (window._clusterCounts || {}).total_rf1 : allTopics.filter(topicLowRep).length;
      const staleTopics      = allTopics.filter(t => logSize(t) > 0 && msgRate(t) === 0).length;

      const totalPartitions = allTopics.reduce((s, t) => s + (t.partition_count || 0), 0);
      const realTotal = (window._clusterCounts || {}).total_topics || totalTopics;
      const topicKpis = `
        <div class="kpi-grid">
          <div class="kpi kpi--orange">
            <div class="kpi__label">Total Topics</div>
            <div class="kpi__value">${realTotal.toLocaleString()}</div>
            <div class="kpi__sub">topics</div>
          </div>
          <div class="kpi kpi--danger">
            <div class="kpi__label">RF=1 At Risk</div>
            <div class="kpi__value">${lowReplication}</div>
            <div class="kpi__sub">data loss risk</div>
          </div>
          <div class="kpi kpi--warn">
            <div class="kpi__label">Hot Topics</div>
            <div class="kpi__value">${highTraffic}</div>
            <div class="kpi__sub">&gt; 1k msgs/sec</div>
          </div>
          <div class="kpi kpi--orange">
            <div class="kpi__label">Retention Risk</div>
            <div class="kpi__value">0</div>
            <div class="kpi__sub">&gt; 70% capacity</div>
          </div>
        </div>`;

      const topByMsgs = [...allTopics].sort((a, b) => msgRate(b) - msgRate(a)).slice(0, 10);
      const topBySize = [...allTopics].sort((a, b) => logSize(b) - logSize(a)).slice(0, 10);

      const topicBarCharts = `
        <div style="display:flex;gap:18px;flex-wrap:wrap;margin-bottom:22px">
          <div class="chart-card" style="flex:1;min-width:300px;margin-bottom:0">
            <div class="chart-card__title">Top 10 Topics by Messages/sec</div>
            <div class="chart-wrap" style="height:260px"><canvas id="topic-msgs-chart"></canvas></div>
          </div>
          <div class="chart-card" style="flex:1;min-width:300px;margin-bottom:0">
            <div class="chart-card__title">Top 10 Topics by Log Size</div>
            <div class="chart-wrap" style="height:260px"><canvas id="topic-size-chart"></canvas></div>
          </div>
        </div>`;

      document.getElementById('tab-topics').innerHTML = '<div style="text-align:center;padding:8px 0;"><span id="topic-loading-badge" style="display:none;align-items:center;gap:8px;padding:8px 20px;background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;border-radius:20px;font-size:14px;font-weight:600;box-shadow:0 2px 8px rgba(255,107,53,0.3);animation:pulse-badge 1.5s ease-in-out infinite;">⟳ Loading topics...</span></div>' + topicKpis + topicBarCharts + topicFilters + `
        <div class="chart-card" style="margin-bottom:22px">
          <div class="chart-card__title">Top 10 Topics by Message Rate</div>
          <div class="chart-wrap"><canvas id="topicChart"></canvas></div>
        </div>
        <div class="chart-card__title">Topic Inventory</div>
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr><th>Topic</th><th style="text-align:center">Partitions</th><th style="text-align:center">RF</th><th>Msg/s</th><th>Bytes/s</th><th style="text-align:right">Log Size</th><th>Status</th></tr></thead>
            <tbody id="topic-tbody"></tbody>
          </table>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px">
          <span id="topic-count-label" class="dash-label"></span>
          <button id="topic-show-more" class="btn btn--secondary btn--sm" onclick="window._topicShowMore()">Show More</button>
        </div>`;

      // Show spinner on JMX-dependent KPIs until streaming enriches
      const _realTotal = (window._clusterCounts || {}).total_topics;
      if (_realTotal) {
        const _kpis = document.querySelectorAll('#tab-topics .kpi__value');
        if (_kpis.length >= 4) {
          _kpis[0].textContent = _realTotal.toLocaleString();
          // Cards 2-4 show spinner until enrichment completes
          _kpis[1].classList.add('kpi-loading');
          _kpis[2].classList.add('kpi-loading');
          _kpis[3].classList.add('kpi-loading');
        }
      }

      // ── Self-contained topic table view: pagination + filter group + search (AND) ──
      const TOPIC_PAGE = 20;
      window._topicView = { filter: 'all', userOnly: false, search: '', visible: TOPIC_PAGE };

      const topicMatches = (t, st) => {
        const name = (t.name || t.topic || 'Unknown');
        if (st.userOnly && name.startsWith('_')) return false;
        if (st.search && !name.toLowerCase().includes(st.search.toLowerCase())) return false;
        const r = msgRate(t), sz = logSize(t), rf = topicRf(t);
        switch (st.filter) {
          case 'anomalous': return (r === 0 && sz > 1000) || topicLowRep(t) || (t.retention_pct != null && t.retention_pct > 80);
          case 'high':      return r > 0.001;
          case 'stale':     return r === 0 && sz > 0;
          case 'underrep':  return topicLowRep(t);
          default:          return true;
        }
      };

      window._applyTopicView = function () {
        const st = window._topicView;
        const filtered = allTopics.filter(t => topicMatches(t, st));
        // Sort: anomalous first, then by log size desc if available, then partition count desc
        const hasLogSize = filtered.some(t => (t.size_bytes || 0) > 0);
        const sorted = hasLogSize
            ? [...filtered].sort((a, b) => {
                const aAnomaly = a.status === 'degraded' ? 0 : a.replication_factor === 1 ? 1 : 2;
                const bAnomaly = b.status === 'degraded' ? 0 : b.replication_factor === 1 ? 1 : 2;
                if (aAnomaly !== bAnomaly) return aAnomaly - bAnomaly;
                return (b.size_bytes || 0) - (a.size_bytes || 0);
              })
            : filtered;
        const shown = sorted.slice(0, st.visible);
        const tbody = document.getElementById('topic-tbody');
        if (tbody) {
          tbody.innerHTML = shown.map(topicRowHtml).join('') ||
            `<tr><td colspan="7" class="data-table__empty">No topics match</td></tr>`;
        }
        const label = document.getElementById('topic-count-label');
        if (label) {
          const _tot = (st.filter === 'all' && !st.userOnly && !st.search)
            ? ((window._clusterCounts || {}).total_topics || filtered.length)
            : filtered.length;
          label.textContent = `Showing ${shown.length} of ${_tot.toLocaleString()} topics`;
        }
        const moreBtn = document.getElementById('topic-show-more');
        if (moreBtn) moreBtn.style.display = shown.length < filtered.length ? '' : 'none';
      };

      const setActiveChip = (el) => {
        el.parentElement.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
      };

      window._setTopicFilter = function (f, el) {
        window._topicView.filter = f;
        window._topicView.visible = TOPIC_PAGE; // reset Show More on filter change
        setActiveChip(el);
        window._applyTopicView();
      };
      window._setTopicShow = function (userOnly, el) {
        window._topicView.userOnly = userOnly;
        window._topicView.visible = TOPIC_PAGE;
        setActiveChip(el);
        window._applyTopicView();
      };
      window._topicSearch = function (val) {
        window._topicView.search = val;
        window._topicView.visible = TOPIC_PAGE;
        window._applyTopicView();
      };
      window._topicShowMore = function () {
        window._topicView.visible += TOPIC_PAGE;
        window._applyTopicView();
      };

      window._applyTopicView();

      setTimeout(async () => {
        destroyChart('topic');
        const ctx = document.getElementById('topicChart')?.getContext('2d');
        if (!ctx) return;
        try {
          const mins = _getMinutes();
          const qs = new URLSearchParams();
          if (_currentClusterId) qs.set('cluster_id', _currentClusterId);
          if (mins) qs.set('minutes', mins);
          const hist = await fetch(`${PROXY}/dashboard/topics/history?${qs.toString()}`,
            { headers: _authHeaders(), cache: 'no-store' }).then(r => r.json());

          if (!hist.empty && hist.series && hist.series.length > 0) {
            const colors = ['#FF6B35','#0D9488','#6366f1','#f59e0b','#16a34a'];
            const timeVal = document.getElementById('ctrl-time').value;
            let _lastDateLabel = '';
            const labels = hist.labels.map(l => {
              const d = new Date(l);
              if (timeVal === '7d') {
                return d.toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short' });
              }
              if (timeVal === '24h') {
                const hourLabel = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                return hourLabel;
              }
              if (timeVal === '6h' || timeVal === '1h') {
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              }
              return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            });
            // Determine tick interval based on time range
            let maxTicks = 10;
            if (timeVal === '5m') maxTicks = 5;
            else if (timeVal === '1h') maxTicks = 6;
            else if (timeVal === '6h') maxTicks = 12;
            else if (timeVal === '24h') maxTicks = 24;
            else if (timeVal === '7d') maxTicks = 7;
            charts['topic'] = new Chart(ctx, {
              type: 'line',
              data: {
                labels,
                datasets: hist.series.map((s, i) => ({
                  label: s.topic,
                  data: s.values,
                  borderColor: colors[i % colors.length],
                  backgroundColor: colors[i % colors.length] + '22',
                  borderWidth: 2,
                  pointRadius: labels.length < 20 ? 3 : 1,
                  tension: 0.3,
                  fill: false,
                })),
              },
              options: {
                responsive: true,
                plugins: {
                  legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                  title: { display: false },
                },
                scales: {
                  x: { ticks: { maxTicksLimit: maxTicks, font: { size: 10 }, maxRotation: 45 } },
                  y: { ticks: { callback: v => fmtRate(v), font: { size: 10 } }, beginAtZero: true },
                },
              },
            });
          } else {
            // Fallback to bar chart if no history
            charts['topic'] = new Chart(ctx, {
              type: 'bar',
              data: {
                labels: topics.map(t => (t.name || t.topic || 'Unknown')),
                datasets: [{ label: 'Messages/sec', data: topics.map(t => t.messages_in_per_sec), backgroundColor: '#FF6B35' }],
              },
              options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } } },
            });
          }
        } catch(e) {
          console.warn('Topic history chart failed:', e);
        }
      }, 50);

      setTimeout(() => {
        if (window._topicMsgsChart) { window._topicMsgsChart.destroy(); window._topicMsgsChart = null; }
        const msgsCtx = document.getElementById('topic-msgs-chart')?.getContext('2d');
        if (msgsCtx) {
          window._topicMsgsChart = new Chart(msgsCtx, {
            type: 'bar',
            data: {
              labels: topByMsgs.map(t => (t.name || t.topic || 'Unknown')),
              datasets: [{ label: 'Messages/sec', data: topByMsgs.map(t => msgRate(t)), backgroundColor: '#FF6B35', borderWidth: 0 }],
            },
            options: {
              indexAxis: 'y',
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false }, title: { display: false } },
              scales: {
                x: { ticks: { callback: v => fmtRate(v), font: { size: 10 } }, beginAtZero: true },
                y: { ticks: { font: { size: 10 } } },
              },
            },
          });
        }

        if (window._topicSizeChart) { window._topicSizeChart.destroy(); window._topicSizeChart = null; }
        const sizeCtx = document.getElementById('topic-size-chart')?.getContext('2d');
        if (sizeCtx) {
          const fmtSize = v => v >= 1073741824
            ? (v / 1073741824).toFixed(1) + ' GB'
            : (v / 1048576).toFixed(0) + ' MB';
          window._topicSizeChart = new Chart(sizeCtx, {
            type: 'bar',
            data: {
              labels: topBySize.map(t => (t.name || t.topic || 'Unknown')),
              datasets: [{ label: 'Log Size', data: topBySize.map(t => logSize(t)), backgroundColor: '#4FC3F7', borderWidth: 0 }],
            },
            options: {
              indexAxis: 'y',
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false }, title: { display: false } },
              scales: {
                x: { ticks: { callback: v => fmtSize(v), font: { size: 10 } }, beginAtZero: true },
                y: { ticks: { font: { size: 10 } } },
              },
            },
          });
        }
      }, 0);
      window._renderTabAI('topics', document.getElementById('tab-topics'));
    }

    // ── Tab 4: Brokers ────────────────────────────────────────────────────────

    function renderBrokers(data) {
      if (data.empty) {
        document.getElementById('tab-brokers').innerHTML = emptyState('🖥', 'No data', 'Generate synthetic data first.');
        return;
      }
      const brokers = data.brokers || [];

      const cards = brokers.map(b => {
        function metricRow(label, pct, max) {
          const color = metricColor(pct);
          const fillPct = Math.min(100, pct);
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:.73rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em">${label}</span>
              <span style="font-size:.85rem;font-weight:700;color:${color}">${pct}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-bar__fill" style="width:${fillPct}%;background:${color}"></div>
            </div>
          </div>`;
        }
        return `
          <div class="broker-card">
            <div class="broker-card__header">
              <span class="broker-card__name">Broker ID: ${(b.broker_id || b.id || 'Broker')}</span>
              <span class="sev sev--${b.heap_pct === 0 && b.messages_in_per_sec === 0 && b.produce_latency_ms === 0 ? 'warning' : b.status === 'healthy' ? 'healthy' : b.status === 'warning' ? 'warning' : 'critical'}">${b.heap_pct === 0 && b.messages_in_per_sec === 0 && b.produce_latency_ms === 0 ? '⚠ METRICS UNAVAILABLE' : b.status.toUpperCase()}</span>
            </div>
            ${metricRow('Heap', b.heap_pct)}
            ${metricRow('CPU', b.cpu_pct)}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">
              <div class="bm">
                <div class="bm__label">GC Pauses</div>
                <div class="bm__value" style="color:${(b.gc_pause_count ?? b.gc_pause_ms ?? 0) > 0 ? '#d97706' : 'var(--success)'}">${(b.gc_pause_count ?? b.gc_pause_ms ?? 0)}</div>
              </div>
              <div class="bm">
                <div class="bm__label">Under-Replicated</div>
                <div class="bm__value" style="color:${b.urp_count > 0 ? 'var(--danger)' : 'var(--success)'}">${b.urp_count}</div>
              </div>
              <div class="bm">
                <div class="bm__label">Msgs/sec</div>
                <div class="bm__value" style="font-size:.9rem">${b.throughput_available === false ? '—' : fmtRate(b.messages_in_per_sec || 0)}</div>
              </div>
              <div class="bm">
                <div class="bm__label">Req Idle %</div>
                <div class="bm__value" style="font-size:.9rem;color:${b.request_handler_idle_pct >= 80 ? 'var(--success)' : b.request_handler_idle_pct >= 50 ? '#d97706' : 'var(--danger)'}">${b.request_handler_idle_pct}%</div>
              </div>
              <div class="bm">
                <div class="bm__label">Bytes In/s</div>
                <div class="bm__value" style="font-size:.85rem">${b.throughput_available === false ? '—' : fmtBytes(b.bytes_in_per_sec || 0)+'/s'}</div>
              </div>
              <div class="bm">
                <div class="bm__label">Bytes Out/s</div>
                <div class="bm__value" style="font-size:.85rem">${b.throughput_available === false ? '—' : fmtBytes(b.bytes_out_per_sec || 0)+'/s'}</div>
              </div>
              <div class="bm">
                <div class="bm__label">ISR Shrink/s</div>
                <div class="bm__value" style="font-size:.85rem;color:${(b.isr_shrinks_per_sec || 0) > 0 ? 'var(--danger)' : 'var(--success)'}">${(b.isr_shrinks_per_sec || 0).toFixed(2)}</div>
              </div>
              <div class="bm">
                <div class="bm__label">ISR Expand/s</div>
                <div class="bm__value" style="font-size:.85rem;color:var(--success)">${(b.isr_expands_per_sec || 0).toFixed(2)}</div>
              </div>
              <div class="bm">
                <div class="bm__label">Produce Latency</div>
                <div class="bm__value" style="font-size:.85rem">${(b.produce_latency_ms || 0).toFixed(1)}ms</div>
              </div>
              <div class="bm">
                <div class="bm__label">Fetch Latency</div>
                <div class="bm__value" style="font-size:.85rem">${(b.fetch_latency_ms || 0).toFixed(1)}ms</div>
              </div>
            </div>
          </div>`;
      }).join('');

      // ── KPI cards ─────────────────────────────────────────────────────────────
      const brokerCount  = brokers.length;
      const healthyCount = brokers.filter(b => b.status === 'healthy').length;
      const totalURPs    = brokers.reduce((s, b) => s + (b.urp_count || 0), 0);
      const avgHeap      = brokerCount ? Math.round(brokers.reduce((s, b) => s + (b.heap_pct || 0), 0) / brokerCount) : 0;
      const totalISRShrinks = brokers.reduce((s, b) => s + (b.isr_shrinks_per_sec || 0), 0);
      const avgReqIdle   = brokerCount ? Math.round(brokers.reduce((s, b) => s + (b.request_handler_idle_pct || 0), 0) / brokerCount) : 0;
      const reqIdleClass = avgReqIdle < 50 ? 'kpi--danger' : avgReqIdle < 80 ? 'kpi--warn' : 'kpi--success';

      const brokerKpis = `
        <div class="kpi-grid">
          <div class="kpi kpi--orange">
            <div class="kpi__label">Total Brokers</div>
            <div class="kpi__value">${brokerCount}</div>
            <div class="kpi__sub">brokers</div>
          </div>
          <div class="kpi kpi--success">
            <div class="kpi__label">Healthy</div>
            <div class="kpi__value">${healthyCount}</div>
            <div class="kpi__sub">status healthy</div>
          </div>
          <div class="kpi ${totalURPs > 0 ? 'kpi--danger' : 'kpi--success'}">
            <div class="kpi__label">Under-Replicated Partitions</div>
            <div class="kpi__value">${totalURPs}</div>
            <div class="kpi__sub">total URPs</div>
          </div>
          <div class="kpi ${avgHeap > 80 ? 'kpi--danger' : 'kpi--orange'}">
            <div class="kpi__label">Avg Heap %</div>
            <div class="kpi__value">${avgHeap}%</div>
            <div class="kpi__sub">across brokers</div>
          </div>
          <div class="kpi ${totalISRShrinks > 0 ? 'kpi--danger' : 'kpi--success'}">
            <div class="kpi__label">ISR Shrinks/sec</div>
            <div class="kpi__value">${totalISRShrinks.toFixed(2)}</div>
            <div class="kpi__sub">across brokers</div>
          </div>
          <div class="kpi ${reqIdleClass}">
            <div class="kpi__label">Avg Request Handler Idle %</div>
            <div class="kpi__value">${avgReqIdle}%</div>
            <div class="kpi__sub">across brokers</div>
          </div>
        </div>`;

      // ── Charts ────────────────────────────────────────────────────────────────
      const brokerCharts = `
        <div style="display:flex;gap:18px;flex-wrap:wrap;margin-bottom:22px">
          <div class="chart-card" style="flex:1;min-width:280px;margin-bottom:0">
            <div class="chart-card__title">CPU &amp; Heap % by Broker</div>
            <div class="chart-wrap" style="height:240px"><canvas id="broker-cpu-heap-chart"></canvas></div>
          </div>
          <div class="chart-card" style="flex:1;min-width:280px;margin-bottom:0">
            <div class="chart-card__title">Network I/O by Broker</div>
            <div class="chart-wrap" style="height:240px"><canvas id="broker-network-chart"></canvas></div>
          </div>
          <div class="chart-card" style="flex:1;min-width:280px;margin-bottom:0">
            <div class="chart-card__title">Produce &amp; Fetch Latency by Broker</div>
            <div class="chart-wrap" style="height:240px"><canvas id="broker-latency-chart"></canvas></div>
          </div>
        </div>`;

      document.getElementById('tab-brokers').innerHTML = brokerKpis + `
        <div class="chart-card__title">Broker Detail</div>
        <div class="broker-grid">${cards}</div>` + brokerCharts;

      const brokerLabels = brokers.map(b => 'Broker ' + (b.broker_id ?? b.id ?? '?'));

      setTimeout(() => {
        if (window._brokerCpuHeapChart) { window._brokerCpuHeapChart.destroy(); window._brokerCpuHeapChart = null; }

                { label: 'Heap %', data: brokers.map(b => b.heap_pct || 0), backgroundColor: '#4FC3F7', borderWidth: 0 },
                { label: 'Req Idle %', data: brokers.map(b => b.request_handler_idle_pct || 0), backgroundColor: '#4CAF50', borderWidth: 0 },
              ],
            },
            options: {
              responsive: true,

              scales: {
