    // ── Tab 5: Connectors ─────────────────────────────────────────────────────

    function renderKafkaConnect(data) {
      const el = document.getElementById('tab-kafka-connect');

      if (data.status === 'not_configured') {
        el.innerHTML = emptyState('🔌', 'Kafka Connect not configured',
          'Edit the cluster in Settings and add a Kafka Connect URL.');
        return;
      }
      if (data.status === 'unreachable') {
        el.innerHTML = emptyState('❌', 'Kafka Connect unreachable',
          `Could not connect to ${data.url}`);
        return;
      }

      const s = data.summary || {};
      const connectors = (data.connectors || []).sort((a, b) => {
        // Failed first, then paused, then running
        const scoreA = a.state === 'FAILED' ? 0 : (a.failed_tasks > 0 ? 1 : a.state === 'PAUSED' ? 2 : 3);
        const scoreB = b.state === 'FAILED' ? 0 : (b.failed_tasks > 0 ? 1 : b.state === 'PAUSED' ? 2 : 3);
        if (scoreA !== scoreB) return scoreA - scoreB;
        return (b.total_tasks || 0) - (a.total_tasks || 0);
      });

      if (!connectors.length) {
        el.innerHTML = `
          <div class="filter-bar" style="color:var(--text-muted)">
            ℹ️ No Kafka Connect configured — add Connect URL in cluster settings
          </div>`;
        return;
      }

      // ── KPI cards ─────────────────────────────────────────────────────────────
      const connectorCount = data.connector_count ?? connectors.length;
      const runningCount   = s.running ?? connectors.filter(c => c.state === 'RUNNING').length;
      const failedCount    = s.failed ?? connectors.filter(c => c.state === 'FAILED').length;
      const totalTasks     = s.total_tasks ?? connectors.reduce((n, c) => n + (c.total_tasks || 0), 0);
      const failedTasks    = s.failed_tasks ?? connectors.reduce((n, c) => n + (c.failed_tasks || 0), 0);

      const connectKpis = `
        <div class="kpi-grid">
          <div class="kpi kpi--orange">
            <div class="kpi__label">Total Connectors</div>
            <div class="kpi__value">${connectorCount}</div>
            <div class="kpi__sub">connectors</div>
          </div>
          <div class="kpi kpi--success">
            <div class="kpi__label">Running</div>
            <div class="kpi__value">${runningCount}</div>
            <div class="kpi__sub">connectors</div>
          </div>
          <div class="kpi ${failedCount > 0 ? 'kpi--danger' : 'kpi--success'}">
            <div class="kpi__label">Failed</div>
            <div class="kpi__value">${failedCount}</div>
            <div class="kpi__sub">connectors</div>
          </div>
          <div class="kpi kpi--orange">
            <div class="kpi__label">Total Tasks</div>
            <div class="kpi__value">${totalTasks}</div>
            <div class="kpi__sub">tasks</div>
          </div>
          <div class="kpi ${failedTasks > 0 ? 'kpi--danger' : 'kpi--success'}">
            <div class="kpi__label">Failed Tasks</div>
            <div class="kpi__value">${failedTasks}</div>
            <div class="kpi__sub">tasks</div>
          </div>
        </div>`;

      // ── Charts ────────────────────────────────────────────────────────────────
      const connectCharts = `
        <div style="display:flex;gap:18px;flex-wrap:wrap;margin-bottom:22px">
          <div class="chart-card" style="flex:1;min-width:300px;margin-bottom:0">
            <div class="chart-card__title">Connector Status Distribution</div>
            <div class="chart-wrap" style="height:240px"><canvas id="connect-status-chart"></canvas></div>
          </div>
          <div class="chart-card" style="flex:1;min-width:300px;margin-bottom:0">
            <div class="chart-card__title">Connectors by Type</div>
            <div class="chart-wrap" style="height:240px"><canvas id="connect-type-chart"></canvas></div>
          </div>
        </div>`;

      // ── Table helpers ───────────────────────────────────────────────────────
      const shortClass = c => {
        const cls = c.connector_class || c.type || '-';
        return cls.includes('.') ? cls.split('.').pop() : cls;
      };
      const statusBadge = state => {
        if (state === 'RUNNING') return `<span class="sev sev--healthy">RUNNING</span>`;
        if (state === 'FAILED')  return `<span class="sev sev--critical">FAILED</span>`;
        if (state === 'PAUSED')  return `<span class="sev sev--warning">PAUSED</span>`;
        return `<span class="sev" style="background:rgba(100,116,139,.12);color:var(--text-muted)">${state || 'UNKNOWN'}</span>`;
      };
      const taskColor = { RUNNING: '#4CAF50', FAILED: '#F44336', PAUSED: '#FF9800', UNASSIGNED: '#666' };
      const taskPills = c => {
        const count = c.total_tasks || (c.tasks ? c.tasks.length : 0);
        if (!count) return '';
        const tasks = Array.from({ length: count }, (_, i) => (c.tasks && c.tasks[i]) || {});
        const pills = tasks.map((t, i) => {
          const state = t.state || 'RUNNING';
          const color = taskColor[state] || '#666';
          const titleParts = [`Task ${i}: ${state}`];
          if (state === 'FAILED' && t.trace) titleParts.push(String(t.trace).slice(0, 200));
          const title = titleParts.join(' — ').replace(/"/g, '&quot;');
          return `<span title="${title}" style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${color}"></span>`;
        }).join('');
        return `<div style="display:inline-flex;gap:2px;margin-top:4px">${pills}</div>`;
      };
      const connectRowHtml = c => `<tr>
          <td style="font-weight:600"><code style="font-size:.8rem">${c.name}</code></td>
          <td style="font-size:.82rem;color:var(--text-muted);text-transform:capitalize">${c.type || '-'}</td>
          <td style="font-size:.8rem"><code style="font-size:.78rem">${shortClass(c)}</code></td>
          <td style="text-align:center;color:${c.failed_tasks > 0 ? 'var(--danger)' : 'var(--text)'}">
            <div>${c.running_tasks ?? 0}/${c.total_tasks ?? 0}</div>
            ${taskPills(c)}
          </td>
          <td style="font-size:.8rem;color:var(--text-muted)">${c.worker_id || c.worker || '-'}</td>
          <td>${statusBadge(c.state)}</td>
        </tr>`;

      el.innerHTML = connectKpis + connectCharts + `
        <div class="filter-bar">
          <span class="dash-label">Status:</span>
          <span class="filter-chip active" onclick="window._connectSetStatus('all',this)">All</span>
          <span class="filter-chip" onclick="window._connectSetStatus('RUNNING',this)">Running</span>
          <span class="filter-chip" onclick="window._connectSetStatus('FAILED',this)">Failed</span>
          <span class="filter-chip" onclick="window._connectSetStatus('PAUSED',this)">Paused</span>
          <input class="filter-input" id="connector-search" placeholder="Search connector…" oninput="window._connectSearch(this.value)" />
        </div>
        <div class="filter-bar">
          <span class="dash-label">Type:</span>
          <span class="filter-chip active" onclick="window._connectSetType('all',this)">All</span>
          <span class="filter-chip" onclick="window._connectSetType('source',this)">Source</span>
          <span class="filter-chip" onclick="window._connectSetType('sink',this)">Sink</span>
        </div>
        <div class="chart-card__title">Connector Inventory</div>
        <div class="data-table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Class</th>
                <th style="text-align:center">Tasks</th>
                <th>Worker</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="connect-tbody"></tbody>
          </table>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px">
          <span id="connect-count-label" class="dash-label"></span>
          <button id="connect-show-more" class="btn btn--secondary btn--sm" onclick="window._connectShowMore()">Show More</button>
        </div>`;

      // ── Self-contained table view: pagination + filters + search (AND) ────────
      const CONNECT_PAGE = 20;
      window._connectView = { status: 'all', type: 'all', search: '', visible: CONNECT_PAGE };

      const connectMatches = (c, st) => {
        if (st.status !== 'all' && c.state !== st.status) return false;
        if (st.type !== 'all' && (c.type || '').toLowerCase() !== st.type) return false;
        if (st.search && !(c.name || '').toLowerCase().includes(st.search.toLowerCase())) return false;
        return true;
      };

      window._connectApplyView = function () {
        const st = window._connectView;
        const filtered = connectors.filter(c => connectMatches(c, st));
        const shown = filtered.slice(0, st.visible);
        const tbody = document.getElementById('connect-tbody');
        if (tbody) {
          tbody.innerHTML = shown.map(connectRowHtml).join('') ||
            `<tr><td colspan="6" class="data-table__empty">No connectors match</td></tr>`;
        }
        const label = document.getElementById('connect-count-label');
        if (label) label.textContent = `Showing ${shown.length} of ${filtered.length} connectors`;
        const moreBtn = document.getElementById('connect-show-more');
        if (moreBtn) moreBtn.style.display = shown.length < filtered.length ? '' : 'none';
      };

      const connectSetActiveChip = (el2) => {
        el2.parentElement.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        el2.classList.add('active');
      };

      window._connectSetStatus = function (status, el2) {
        window._connectView.status = status;
        window._connectView.visible = CONNECT_PAGE;
        connectSetActiveChip(el2);
        window._connectApplyView();
      };
      window._connectSetType = function (type, el2) {
        window._connectView.type = type;
        window._connectView.visible = CONNECT_PAGE;
        connectSetActiveChip(el2);
        window._connectApplyView();
      };
      window._connectSearch = function (val) {
        window._connectView.search = val;
        window._connectView.visible = CONNECT_PAGE;
        window._connectApplyView();
      };
      window._connectShowMore = function () {
        window._connectView.visible += CONNECT_PAGE;
        window._connectApplyView();
      };

      window._connectApplyView();

      // ── Doughnut charts ───────────────────────────────────────────────────────
      setTimeout(() => {
        if (window._connectStatusChart) { window._connectStatusChart.destroy(); window._connectStatusChart = null; }
        const statusCtx = document.getElementById('connect-status-chart')?.getContext('2d');
        if (statusCtx) {
          const statusDefs = [
            { label: 'Running',    color: '#4CAF50', count: connectors.filter(c => c.state === 'RUNNING').length },
            { label: 'Failed',     color: '#F44336', count: connectors.filter(c => c.state === 'FAILED').length },
            { label: 'Paused',     color: '#FF9800', count: connectors.filter(c => c.state === 'PAUSED').length },
            { label: 'Unassigned', color: '#666',    count: connectors.filter(c => c.state === 'UNASSIGNED').length },
          ].filter(d => d.count > 0);
          window._connectStatusChart = new Chart(statusCtx, {
            type: 'doughnut',
            data: {
              labels: statusDefs.map(d => d.label),
              datasets: [{ data: statusDefs.map(d => d.count), backgroundColor: statusDefs.map(d => d.color), borderWidth: 0 }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
            },
          });
        }

        if (window._connectTypeChart) { window._connectTypeChart.destroy(); window._connectTypeChart = null; }
        const typeCtx = document.getElementById('connect-type-chart')?.getContext('2d');
        if (typeCtx) {
          const typeDefs = [
            { label: 'Source', color: '#4FC3F7', count: connectors.filter(c => (c.type || '').toLowerCase() === 'source').length },
            { label: 'Sink',   color: '#FF6B35', count: connectors.filter(c => (c.type || '').toLowerCase() === 'sink').length },
          ].filter(d => d.count > 0);
          window._connectTypeChart = new Chart(typeCtx, {
            type: 'doughnut',
            data: {
              labels: typeDefs.map(d => d.label),
              datasets: [{ data: typeDefs.map(d => d.count), backgroundColor: typeDefs.map(d => d.color), borderWidth: 0 }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
            },
          });
        }
      }, 0);
      window._renderTabAI('kafka-connect', document.getElementById('tab-kafka-connect'));
    }

    // ── Tab 6: AI Insights ────────────────────────────────────────────────────

    async function renderInsights(data) {
      if (data.empty) {
        document.getElementById('tab-insights').innerHTML = emptyState('🤖', 'No data', 'Generate synthetic data first.');
        return;
      }
      const anomalies = data.anomalies || [];

      // Build anomaly cards
      const cards = anomalies.length ? anomalies.map(a => {
        const recs = (a.recommendations || []).map(r => `<li>${r}</li>`).join('');
        const sevColor = a.severity === 'critical' ? '#dc2626' : '#d97706';
        return `
          <div class="anomaly-card">
            <div class="anomaly-card__header">
              <div>
                ${sevBadge(a.severity)}
                <span style="margin-left:8px;font-size:.78rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em">${(a.category||'').replace(/_/g,' ')}</span>
              </div>
            </div>
            <div class="anomaly-card__desc">${a.description}</div>
            ${recs ? `<div class="anomaly-card__recs"><strong style="font-size:.8rem;color:var(--text-muted)">Recommendations:</strong><ul style="margin-top:4px">${recs}</ul></div>` : ''}
          </div>`;
      }).join('') : `<div style="text-align:center;padding:2rem;color:var(--success);font-size:.95rem">✅ No active anomalies — all metrics within thresholds</div>`;

      // Narrative section placeholder
      const narrativeHtml = `
        <div class="anomaly-card" id="ai-narrative-card" style="margin-bottom:18px;border-color:var(--accent);border-width:2px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="font-weight:700;font-size:.95rem;color:var(--accent)">🤖 AI Cluster Analysis</div>
            <button class="dash-refresh-btn" id="btn-get-narrative" style="font-size:.8rem;padding:4px 12px">
              Generate Analysis
            </button>
          </div>
          <div id="narrative-content" style="font-size:.88rem;color:var(--text-muted);line-height:1.6">
            Click "Generate Analysis" for an AI-powered summary and recommendations.
          </div>
        </div>`;

      document.getElementById('tab-insights').innerHTML = narrativeHtml + `<div class="anomaly-list">${cards}</div>`;

      // Bind narrative button
      document.getElementById('btn-get-narrative')
        .addEventListener('click', async () => {
        const btn = document.getElementById('btn-get-narrative');
        const content = document.getElementById('narrative-content');
        btn.textContent = 'Analysing…';
        btn.disabled = true;

        // Progress messages
        const progressMessages = [
          'Analysing cluster health…',
          'Reviewing broker metrics…',
          'Checking consumer group health…',
          'Identifying anomalies…',
          'Preparing recommendations…',
        ];
        let msgIdx = 0;
        content.style.fontStyle = 'italic';
        content.style.color = 'var(--text-muted)';
        content.textContent = progressMessages[0];
        const progressInterval = setInterval(() => {
          msgIdx = (msgIdx + 1) % progressMessages.length;
          content.textContent = progressMessages[msgIdx];
        }, 2000);

        let fullText = '';
        let sseBuffer = '';
        let done_reading = false;
        let firstToken = false;
        let stopReason = 'end_turn';

        try {
          await portalReady;
          const url = `${PROXY}/dashboard/insights/narrative/stream${
            _currentClusterId ? '?cluster_id=' + _currentClusterId : ''}`;

          const response = await fetch(url, {
            method: 'POST',
            headers: _authHeaders(),
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done || done_reading) break;
            const chunk = decoder.decode(value, { stream: true });
            sseBuffer += chunk;
            const lines = sseBuffer.split('\n');
            sseBuffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const data = line.slice(6).trimEnd();
              if (data.startsWith('[STOP_REASON]')) {
                stopReason = data.slice(14).trim();
                continue;
              }
              if (data === '[DONE]') { done_reading = true; break; }
              if (data.startsWith('[ERROR]')) {
                throw new Error(data.slice(7).trim());
              }
              if (!firstToken) {
                firstToken = true;
                clearInterval(progressInterval);
                content.style.fontStyle = 'normal';
                content.style.color = 'var(--text)';
                content.innerHTML = '';
              }
              const text = data.replace(/\\n/g, '\n');
              fullText += text;
              // Render markdown progressively
              const rendered = fullText
                .replace(/^## (.*)/gm, '<h3 style="color:var(--accent);margin:12px 0 6px">$1</h3>')
                .replace(/^### (.*)/gm, '<h4 style="margin:8px 0 4px">$1</h4>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
              // Convert markdown tables to HTML tables
              content.innerHTML = rendered.replace(/(\|.+\|(<br>)?)+/g, tableBlock => {
                const lines = tableBlock.split('<br>').filter(l => l.trim() && l.includes('|'));
                const dataLines = lines.filter(l => !/^\|[-| :]+\|$/.test(l.trim()));
                if (!dataLines.length) return '';
                const rows = dataLines.map((line, i) => {
                  const cells = line.replace(/^\||\|$/g, '').split('|').map(c => c.trim());
                  const tag = i === 0 ? 'th' : 'td';
                  const style = i === 0 ? 'padding:5px 10px;border:1px solid var(--border);background:var(--navy-1);font-weight:600' : 'padding:4px 10px;border:1px solid var(--border)';
                  return '<tr>' + cells.map(c => `<${tag} style="${style}">${c}</${tag}>`).join('') + '</tr>';
                }).join('');
                return `<table style="border-collapse:collapse;margin:8px 0;font-size:.85rem;width:100%">${rows}</table>`;
              });
            }
          }
          btn.textContent = '↺ Refresh Analysis';
          btn.disabled = false;
          if (stopReason === 'max_tokens') {
            const continueBtn = document.createElement('button');
            continueBtn.textContent = 'Continue Analysis ›';
            continueBtn.className = 'dash-refresh-btn';
            continueBtn.style.cssText = 'font-size:.8rem;padding:4px 12px;margin-left:8px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer';
            continueBtn.onclick = async () => {
              continueBtn.remove();
              btn.textContent = 'Analysing…';
              btn.disabled = true;
              const prevText = fullText;
              fullText = '';
              firstToken = false;
              stopReason = 'end_turn';
              const contUrl = `${PROXY}/dashboard/insights/narrative/stream${_currentClusterId ? '?cluster_id=' + _currentClusterId : ''}`;
              const contRes = await fetch(contUrl, {
                method: 'POST',
                headers: { ..._authHeaders(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ continuation_of: prevText }),
              });
              if (!contRes.ok) throw new Error(`HTTP ${contRes.status}`);
              const contReader = contRes.body.getReader();
              const contDecoder = new TextDecoder();
              while (true) {
                const { done, value } = await contReader.read();
                if (done) break;
                const chunk = contDecoder.decode(value, { stream: true });
                for (const line of chunk.split('\n')) {
                  if (!line.startsWith('data: ')) continue;
                  const d = line.slice(6);
                  if (d.startsWith('[STOP_REASON]')) { stopReason = d.slice(14).trim(); continue; }
                  if (d === '[DONE]') break;
                  if (d.startsWith('[ERROR]')) break;
                  const t = d.replace(/\\n/g, '\n');
                  fullText += t;
                }
              }
              content.innerHTML = (prevText + fullText)
                .replace(/^## (.*)/gm, '<h3 style="color:var(--accent);margin:12px 0 6px">$1</h3>')
                .replace(/^### (.*)/gm, '<h4 style="margin:8px 0 4px">$1</h4>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
              btn.textContent = '↺ Refresh Analysis';
              btn.disabled = false;
              if (stopReason === 'max_tokens') content.appendChild(continueBtn.cloneNode(true));
            };
            document.getElementById('ai-narrative-card').appendChild(continueBtn);
          }
        } catch(e) {
          clearInterval(progressInterval);
          content.style.fontStyle = 'normal';
          content.textContent = 'Failed: ' + e.message;
          btn.textContent = 'Generate Analysis';

        btn.disabled = false;

    window._tabAICache = window._tabAICache || {};

    const _AI_TAB_NAMES = {
      'brokers': 'Brokers',
      'topics': 'Topics',
      'consumer-groups': 'Consumer Groups',
      'kafka-connect': 'Kafka Connect',
      'zookeeper': 'ZooKeeper',
      'schema-registry': 'Schema Registry',
      'mirrormaker': 'MirrorMaker',

    const _aiRenderMd = (text) => {
      const rendered = text
        .replace(/^## (.*)/gm, '<h3 style="color:var(--accent);margin:12px 0 6px">$1</h3>')
        .replace(/^### (.*)/gm, '<h4 style="margin:8px 0 4px">$1</h4>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^---$/gm, '<hr style="margin:8px 0;border:none;border-top:1px solid var(--border)">')
        .replace(/\n/g, '<br>');
      return rendered.replace(/(\|.+\|(<br>)?)+/g, tableBlock => {
        const lines = tableBlock.split('<br>').filter(l => l.trim() && l.includes('|'));
        const dataLines = lines.filter(l => !/^\|[-| :]+\|$/.test(l.trim()));
        if (!dataLines.length) return '';
        const rows = dataLines.map((line, i) => {
          const cells = line.replace(/^\||\|$/g, '').split('|').map(c => c.trim());
          const tag = i === 0 ? 'th' : 'td';
          const style = i === 0 ? 'padding:5px 10px;border:1px solid var(--border);background:var(--navy-1);font-weight:600' : 'padding:4px 10px;border:1px solid var(--border)';
          return '<tr>' + cells.map(c => `<${tag} style="${style}">${c}</${tag}>`).join('') + '</tr>';
        }).join('');
        return `<table style="border-collapse:collapse;margin:8px 0;font-size:.85rem;width:100%">${rows}</table>`;
      });
    };

    function _aiAddContinue(tabId, prevText) {
      const content = document.getElementById('ai-drawer-content');
      const refreshBtn = document.getElementById('ai-drawer-refresh');
      const continueBtn = document.createElement('button');
      continueBtn.textContent = 'Continue Analysis ›';
      continueBtn.className = 'dash-refresh-btn';
      continueBtn.style.cssText = 'font-size:.8rem;padding:4px 12px;margin-top:10px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer';
      continueBtn.onclick = async () => {
        continueBtn.remove();
        if (refreshBtn) refreshBtn.disabled = true;
        const clusterId = _currentClusterId || (document.getElementById('ctrl-cluster')?.value) || '';
        const cacheKey = tabId + '_' + clusterId;
        let contFull = '';
        let stopReason = 'end_turn';
        try {
          const contUrl = `${PROXY}/dashboard/insights/tab-stream${clusterId ? '?cluster_id=' + clusterId : ''}`;
          const contRes = await fetch(contUrl, {
            method: 'POST',
            headers: { ..._authHeaders(), 'Content-Type': 'application/json' },
            body: JSON.stringify({ tab: tabId, continuation_of: prevText }),
          });
          if (!contRes.ok) throw new Error(`HTTP ${contRes.status}`);
          const contReader = contRes.body.getReader();
          const contDecoder = new TextDecoder();
          while (true) {
            const { done, value } = await contReader.read();
            if (done || window._aiDrawerTab !== tabId) break;
            const chunk = contDecoder.decode(value, { stream: true });
            for (const line of chunk.split('\n')) {
              if (!line.startsWith('data: ')) continue;
              const d = line.slice(6);
              if (d.startsWith('[STOP_REASON]')) { stopReason = d.slice(14).trim(); continue; }
              if (d === '[DONE]') break;
              if (d.startsWith('[ERROR]')) break;
              contFull += d.replace(/\\n/g, '\n');
            }
            if (content) content.innerHTML = _aiRenderMd(prevText + contFull);
          }
          if (content) content.innerHTML = _aiRenderMd(prevText + contFull);
          window._tabAICache[cacheKey] = content ? content.innerHTML : '';
          if (refreshBtn) refreshBtn.disabled = false;
          if (stopReason === 'max_tokens') _aiAddContinue(tabId, prevText + contFull);
        } catch (e) {
          if (refreshBtn) refreshBtn.disabled = false;
        }
      };
      content.parentElement.appendChild(continueBtn);
    }

    async function _runAIDrawer(tabId) {
      _ensureAIDrawer();
      window._aiDrawerTab = tabId;
      const clusterId = _currentClusterId || (document.getElementById('ctrl-cluster')?.value) || '';
      const cacheKey = tabId + '_' + clusterId;
      const titleEl = document.getElementById('ai-drawer-title');
      const content = document.getElementById('ai-drawer-content');
      const refreshBtn = document.getElementById('ai-drawer-refresh');
      if (titleEl) titleEl.textContent = `🤖 AI Analysis — ${_AI_TAB_NAMES[tabId] || tabId}`;

      // Show cached result if present
      if (window._tabAICache[cacheKey]) {
        content.style.fontStyle = 'normal';
        content.style.color = 'var(--text)';
        content.innerHTML = window._tabAICache[cacheKey];
        if (refreshBtn) refreshBtn.disabled = false;
        return;
      }

      const progressMessages = [
        'Analysing ' + tabId + '…',
        'Reviewing metrics…',
        'Identifying risks…',
        'Preparing recommendations…',
      ];
      let msgIdx = 0;
      content.style.fontStyle = 'italic';
      content.style.color = 'var(--text-muted)';
      content.textContent = progressMessages[0];
      const progressInterval = setInterval(() => {
        msgIdx = (msgIdx + 1) % progressMessages.length;
        if (window._aiDrawerTab === tabId) content.textContent = progressMessages[msgIdx];
      }, 2000);

      let fullText = '';
      let sseBuffer = '';
      let done_reading = false;
      let firstToken = false;
      let stopReason = 'end_turn';

      if (refreshBtn) refreshBtn.disabled = true;
      try {
        await portalReady;
        const url = `${PROXY}/dashboard/insights/tab-stream${clusterId ? '?cluster_id=' + clusterId : ''}`;
        const response = await fetch(url, {
          method: 'POST',
          headers: { ..._authHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ tab: tabId }),
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done || done_reading) break;
          if (window._aiDrawerTab !== tabId) { clearInterval(progressInterval); return; }
          const chunk = decoder.decode(value, { stream: true });
          sseBuffer += chunk;
          const lines = sseBuffer.split('\n');
          sseBuffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const dataLine = line.slice(6).trimEnd();
            if (dataLine.startsWith('[STOP_REASON]')) { stopReason = dataLine.slice(14).trim(); continue; }
            if (dataLine === '[DONE]') { done_reading = true; break; }
            if (dataLine.startsWith('[ERROR]')) throw new Error(dataLine.slice(7).trim());
            if (!firstToken) {
              firstToken = true;
              clearInterval(progressInterval);
              content.style.fontStyle = 'normal';
              content.style.color = 'var(--text)';
              content.innerHTML = '';
            }
            fullText += dataLine.replace(/\\n/g, '\n');
            content.innerHTML = _aiRenderMd(fullText);
          }
        }
        clearInterval(progressInterval);
        window._tabAICache[cacheKey] = content.innerHTML;
        if (refreshBtn) refreshBtn.disabled = false;
        if (stopReason === 'max_tokens') _aiAddContinue(tabId, fullText);
      } catch (e) {
        clearInterval(progressInterval);
        content.style.fontStyle = 'normal';
        content.style.color = 'var(--text)';
        content.textContent = 'Failed: ' + e.message;
        if (refreshBtn) refreshBtn.disabled = false;
      }
    }

    function renderSchemaRegistry(data) {

        { label: 'PROTOBUF', color: '#9C27B0', count: schemaTypes.PROTOBUF || 0 },

    /* ── On-demand streaming: Topics ────────────────────── */
    let _topicStreamActive = false;
    function _updateTopicKPIs(topics, loaded, total, isDone) {
      const kpiEl = document.getElementById('tab-topics');
      if (!kpiEl) return;
      const kpis = kpiEl.querySelectorAll('.kpi__value');
      if (kpis.length < 4) return;
      const counts = window._clusterCounts || {};
      const realTotal = counts.total_topics || topics.length;
      // Use accurate cluster-wide counts if available, otherwise compute from displayed topics
      const lowRep = counts.total_rf1 != null ? counts.total_rf1 : topics.filter(t => t.replication_factor === 1 && t.partition_count > 0).length;
      const hotTopics = topics.filter(t => (t.messages_in_per_sec || 0) > 1000).length;
      const retentionRisk = topics.filter(t => (t.retention_pct || 0) > 70).length;
      if (isDone) {
        kpis[0].textContent = realTotal.toLocaleString();
        kpis[0].classList.remove('kpi-loading');
        kpis[1].textContent = lowRep.toLocaleString();
        kpis[1].style.color = lowRep > 0 ? 'var(--red)' : '';
        kpis[1].classList.remove('kpi-loading');
        kpis[2].textContent = hotTopics;
        kpis[2].classList.remove('kpi-loading');
        kpis[3].textContent = retentionRisk;
        kpis[3].classList.remove('kpi-loading');
      } else {
        kpis[0].textContent = realTotal.toLocaleString();
        kpis[1].textContent = lowRep.toLocaleString();
        kpis[1].classList.add('kpi-loading');
        kpis[2].textContent = hotTopics;
        kpis[2].classList.add('kpi-loading');
        kpis[3].textContent = retentionRisk;
        kpis[3].classList.add('kpi-loading');
      }
    }
    async function _streamTopicDetails() {
      if (_topicStreamActive) return;
      _topicStreamActive = true;
      const cid = _clusterId();
      if (!cid) return;

      const badge = document.getElementById('topic-loading-badge');
      if (badge) badge.style.display = 'inline-flex';

      // Mark KPIs as loading
      const kpiEl = document.getElementById('tab-topics');
      if (kpiEl) kpiEl.querySelectorAll('.kpi__value').forEach(k => k.classList.add('kpi-loading'));

      try {
        const resp = await fetch(_base() + '/dashboard/topics/stream?cluster_id=' + cid, {
          headers: typeof _authHeaders === 'function' ? _authHeaders() : {}
        });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let count = 0;
        const total = (window._topicAllTopics || []).length;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            try {
              const obj = JSON.parse(payload);
              if (obj.done) {
                if (badge) badge.style.display = 'none';
                _topicStreamActive = false;
                if (window._topicAllTopics) {
                  // Sort by anomaly severity: degraded first, then low-rep (RF=1), then healthy
                  window._topicAllTopics.sort((a, b) => {
                    const scoreA = (a.status === 'degraded' ? 0 : a.replication_factor === 1 ? 1 : 2);
                    const scoreB = (b.status === 'degraded' ? 0 : b.replication_factor === 1 ? 1 : 2);
                    if (scoreA !== scoreB) return scoreA - scoreB;
                    return (b.partition_count || 0) - (a.partition_count || 0);
                  });
                  _updateTopicKPIs(window._topicAllTopics, count, total, true);
                  // Update total count from real cluster data
                  const totalTopics = obj.total_topics || (window._clusterCounts || {}).total_topics || window._topicAllTopics.length;
                  const kpiEl2 = document.getElementById('tab-topics');
                  if (kpiEl2) {
                    const kpis = kpiEl2.querySelectorAll('.kpi__value');
                    if (kpis.length >= 1) kpis[0].textContent = totalTopics.toLocaleString();
                  }
                  window._applyTopicView && window._applyTopicView();
                }
                return;
              }
              if (obj.error) continue;
              if (window._topicAllTopics) {
                const idx = window._topicAllTopics.findIndex(t => t.name === obj.name);
                if (idx >= 0) {
                  Object.assign(window._topicAllTopics[idx], obj);
                } else {
                  window._topicAllTopics.push(obj);
                }
              }
              count++;
              const realTotal = (window._clusterCounts || {}).total_topics || total;
              if (badge) badge.textContent = '⟳ Describing topics... ' + count + ' of ' + realTotal.toLocaleString();
              // Progressive KPI + table update every 100 topics
              if (count % 100 === 0 && window._topicAllTopics) {
                _updateTopicKPIs(window._topicAllTopics, count, total, false);
                window._applyTopicView && window._applyTopicView();
              }
            } catch (e) { /* skip malformed */ }
          }
        }
      } catch (err) {
        console.warn('Topic stream error:', err);
      }
      if (badge) badge.style.display = 'none';
      _topicStreamActive = false;
    }

    /* ── On-demand streaming: Consumer Groups ────────────── */
    let _groupStreamActive = false;
    function _updateGroupKPIs(groups, isDone) {
      const kpiEl = document.getElementById('tab-consumer-groups');
      if (!kpiEl) return;
      const kpis = kpiEl.querySelectorAll('.kpi__value');
      if (kpis.length < 4) return;
      const scanned = groups.filter(g => g.total_lag >= 0);
      const critical = scanned.filter(g => g.total_lag > 10000).length;
      const warning = scanned.filter(g => g.total_lag > 1000 && g.total_lag <= 10000).length;
      const realTotal = (window._clusterCounts || {}).total_groups || groups.length;
      // Healthy includes: scanned with lag <= 1000 + empty/dead groups (no consumers = no lag concern)
      const healthy = realTotal - critical - warning;
      if (isDone) {
        kpis[0].textContent = realTotal.toLocaleString();
        kpis[0].classList.remove('kpi-loading');
        kpis[1].textContent = critical;
        kpis[1].style.color = critical > 0 ? 'var(--red)' : '';
        kpis[1].classList.remove('kpi-loading');
        kpis[2].textContent = warning;
        kpis[2].style.color = warning > 0 ? 'var(--orange)' : '';
        kpis[2].classList.remove('kpi-loading');
        kpis[3].textContent = healthy;
        kpis[3].style.color = 'var(--green)';
        kpis[3].classList.remove('kpi-loading');
      } else {
        kpis[0].textContent = realTotal.toLocaleString();
        kpis[1].textContent = critical;
        kpis[1].classList.add('kpi-loading');
        kpis[2].textContent = warning;
        kpis[2].classList.add('kpi-loading');
        kpis[3].textContent = healthy;
        kpis[3].classList.add('kpi-loading');
      }
    }
    async function _streamGroupLags() {
      if (_groupStreamActive) return;
      _groupStreamActive = true;
      const cid = _clusterId();
      if (!cid) return;

      const badge = document.getElementById('cg-loading-badge');
      if (badge) badge.style.display = 'inline-flex';

      const kpiEl = document.getElementById('tab-consumer-groups');
      if (kpiEl) kpiEl.querySelectorAll('.kpi__value').forEach(k => k.classList.add('kpi-loading'));

      try {
        const resp = await fetch(_base() + '/dashboard/groups/stream?cluster_id=' + cid, {
          headers: typeof _authHeaders === 'function' ? _authHeaders() : {}
        });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let count = 0;
        const realTotal = (window._clusterCounts || {}).total_groups || (window._cgGroups || []).length;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            try {
              const obj = JSON.parse(payload);
              if (obj.done) {
                if (badge) badge.style.display = 'none';
                _groupStreamActive = false;
                if (window._cgGroups) {
                  window._cgGroups.sort((a, b) => (b.total_lag || 0) - (a.total_lag || 0));
                  _updateGroupKPIs(window._cgGroups, true);

                  const hasLag = window._cgGroups.some(g => g.total_lag > 0);
                  const chartCanvas = document.getElementById('cg-lag-chart');
                  const chartContainer = document.getElementById('cg-chart-container');
                  if (hasLag && chartCanvas) {
                    const top10 = window._cgGroups.filter(g => g.total_lag > 0).sort((a,b) => b.total_lag - a.total_lag).slice(0, 10);
                    if (charts['cgLag']) { charts['cgLag'].destroy(); charts['cgLag'] = null; }
                    if (chartContainer) chartContainer.style.maxHeight = '350px';
                    charts['cgLag'] = new Chart(chartCanvas, {
                      type: 'bar',
                      data: {
                        labels: top10.map(g => g.group_id.length > 35 ? g.group_id.slice(0,32)+'...' : g.group_id),
                        datasets: [{
                          label: 'Total Lag',
                          data: top10.map(g => g.total_lag),
                          backgroundColor: top10.map(g => g.total_lag > 10000 ? '#e74c3c' : g.total_lag > 1000 ? '#f39c12' : '#27ae60'),
                        }]
                      },
                      options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { display: false } },
                        scales: { x: { title: { display: true, text: 'Total Lag' } } }
                      }
                    });
                  }
                  if (chartContainer && !hasLag) chartContainer.style.display = 'none';

                  const noLagBanner = document.getElementById('cg-no-lag-banner');
                  if (noLagBanner && hasLag) noLagBanner.style.display = 'none';

                  const totalGroups = obj.total_groups || realTotal;
                  const kpiEl2 = document.getElementById('tab-consumer-groups');
                  if (kpiEl2) {
                    const kpis = kpiEl2.querySelectorAll('.kpi__value');
                    if (kpis.length >= 1) kpis[0].textContent = totalGroups.toLocaleString();
                  }
                  window._cgApplyView && window._cgApplyView();
                }
                return;
              }
              if (obj.error) continue;
              if (window._cgGroups) {
                const idx = window._cgGroups.findIndex(g => g.group_id === obj.group_id);
                if (idx >= 0) {
                  window._cgGroups[idx].total_lag = obj.total_lag;
                  window._cgGroups[idx].topic_count = obj.topic_count;
                  window._cgGroups[idx].partitions = obj.partitions || [];
                }
              }
              count++;
              if (badge) {
                const pct = Math.round((count / realTotal) * 100);
                badge.textContent = '⟳ Scanning group lag... ' + count + ' of ' + realTotal + ' (' + pct + '%)';
              }
              if (count % 20 === 0 && window._cgGroups) {
                window._cgGroups.sort((a, b) => (b.total_lag || 0) - (a.total_lag || 0));
                _updateGroupKPIs(window._cgGroups, false);
                window._cgApplyView && window._cgApplyView();
              }
            } catch (e) { /* skip malformed */ }
          }
        }
      } catch (err) {
        console.warn('Group lag stream error:', err);
      }
      if (badge) badge.style.display = 'none';
      _groupStreamActive = false;
    }

    /* ── Server-side topic search ────────────────────────── */
    let _topicSearchTimer = null;
    function _serverTopicSearch(query) {
      clearTimeout(_topicSearchTimer);
      if (!query || query.length < 2) {
        // Fall back to client-side filter on summary data
        if (window._topicSearch) window._topicSearch(query);
        return;
      }
      _topicSearchTimer = setTimeout(async () => {
        const cid = _clusterId();
        try {
          const d = await api('/dashboard/topics/search?cluster_id=' + cid + '&q=' + encodeURIComponent(query));
          if (d.topics && d.topics.length > 0) {
            // Replace visible topics with search results
            window._topicAllTopics = d.topics;
            window._applyTopicView && window._applyTopicView();
          } else if (window._topicSearch) {
            window._topicSearch(query);
          }
        } catch (e) {
          if (window._topicSearch) window._topicSearch(query);
        }
      }, 400);
    }

    /* ── Server-side group search ────────────────────────── */
    let _groupSearchTimer = null;
    function _serverGroupSearch(query) {
      clearTimeout(_groupSearchTimer);
      if (!query || query.length < 2) {
        if (window._cgSearch) window._cgSearch(query);
        return;
      }
      _groupSearchTimer = setTimeout(async () => {
        const cid = _clusterId();
        try {
          const d = await api('/dashboard/groups/search?cluster_id=' + cid + '&q=' + encodeURIComponent(query));
          if (d.groups && d.groups.length > 0) {
            window._cgGroups = d.groups;
            window._cgApplyView && window._cgApplyView();
          } else if (window._cgSearch) {
            window._cgSearch(query);
          }
        } catch (e) {
          if (window._cgSearch) window._cgSearch(query);
        }
      }, 400);
    }
  </script>
  <script>
    // ── Fix nav links in standalone mode ──────────────────────────────────
    if (!_isPortalMode) {
      document.querySelectorAll('[data-standalone-href]').forEach(el => {
        el.href = el.dataset.standaloneHref;
      });
      var topbar = document.querySelector('.topbar');
      if (topbar) topbar.style.display = 'none';
      var lbl = document.getElementById('agent-label');
      if (lbl) lbl.style.display = 'inline';
    }
  </script>
</body>
</html>
